<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <style>
    :root {
      --header-bg: #16b4b5;
      --icon: #13212a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      height: 68px;
      overflow: hidden;
      background: var(--header-bg);
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    .header {
      height: 100%;
      padding: 3px 18px 0;
      display: grid;
      grid-template-columns: 32px 1fr 32px;
      align-items: start;
    }

    .menu {
      width: 32px;
      height: 32px;
      border: 0;
      background: transparent;
      padding: 0;
      cursor: default;
      align-self: end;
      margin-bottom: 10px;
      position: relative;
    }

    .menu::before {
      content: "";
      position: absolute;
      left: 6px;
      top: 9px;
      width: 18px;
      height: 1.5px;
      border-radius: 999px;
      background: var(--icon);
      display: block;
      box-shadow: 0 5px 0 var(--icon), 0 10px 0 var(--icon);
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      align-self: end;
      margin-bottom: 6px;
      position: relative;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    .logo {
      width: 82px;
      height: 44px;
      display: block;
    }

    .logo svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .version-popup {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(19, 33, 42, 0.9);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity .16s ease;
      user-select: none;
      -webkit-user-select: none;
    }

    .version-popup.show {
      opacity: 1;
    }
  </style>
</head>

  <script>
    const logoWrap = document.querySelector('.logo-wrap');
    const versionPopup = document.getElementById('version-popup');
    const version = new URLSearchParams(window.location.search).get('v') || 'unknown';
    let versionPressTimer = null;
    let versionPopupTimer = null;
    let versionPointerId = null;
    let versionStartX = 0;
    let versionStartY = 0;

    function hideVersionPopup() {
      if (versionPopupTimer) {
        clearTimeout(versionPopupTimer);
        versionPopupTimer = null;
      }
      versionPopup.classList.remove('show');
      versionPopup.setAttribute('aria-hidden', 'true');
    }

    function showVersionPopup() {
      versionPopup.textContent = `v${version}`;
      versionPopup.classList.add('show');
      versionPopup.setAttribute('aria-hidden', 'false');
      if (versionPopupTimer) clearTimeout(versionPopupTimer);
      versionPopupTimer = setTimeout(hideVersionPopup, 1800);
    }

    function clearVersionLongPress() {
      if (versionPressTimer) {
        clearTimeout(versionPressTimer);
        versionPressTimer = null;
      }
      versionPointerId = null;
    }

    function startVersionLongPress(clientX, clientY, pointerId = null) {
      clearVersionLongPress();
      versionPointerId = pointerId;
      versionStartX = Number(clientX) || 0;
      versionStartY = Number(clientY) || 0;
      versionPressTimer = setTimeout(() => {
        versionPressTimer = null;
        versionPointerId = null;
        showVersionPopup();
      }, 550);
    }

    if (window.PointerEvent) {
      logoWrap.addEventListener('pointerdown', (event) => {
        if (!event.isPrimary) return;
        startVersionLongPress(event.clientX, event.clientY, event.pointerId);
      });
      logoWrap.addEventListener('pointermove', (event) => {
        if (!versionPressTimer) return;
        if (versionPointerId !== null && event.pointerId !== versionPointerId) return;
        const moveX = Math.abs(event.clientX - versionStartX);
        const moveY = Math.abs(event.clientY - versionStartY);
        if (moveX > 10 || moveY > 10) clearVersionLongPress();
      });
      ['pointerup', 'pointerleave', 'pointercancel'].forEach((eventName) => {
        logoWrap.addEventListener(eventName, (event) => {
          if (versionPointerId !== null && event.pointerId !== versionPointerId) return;
          clearVersionLongPress();
        });
      });
    } else {
      logoWrap.addEventListener('touchstart', (event) => {
        const touch = event.touches[0];
        if (!touch) return;
        startVersionLongPress(touch.clientX, touch.clientY);
      }, { passive: true });
      logoWrap.addEventListener('touchmove', (event) => {
        if (!versionPressTimer) return;
        const touch = event.touches[0];
        if (!touch) return clearVersionLongPress();
        const moveX = Math.abs(touch.clientX - versionStartX);
        const moveY = Math.abs(touch.clientY - versionStartY);
        if (moveX > 10 || moveY > 10) clearVersionLongPress();
      }, { passive: true });
      ['touchend', 'touchcancel'].forEach((eventName) => {
        logoWrap.addEventListener(eventName, clearVersionLongPress, { passive: true });
      });
      logoWrap.addEventListener('mousedown', (event) => {
        startVersionLongPress(event.clientX, event.clientY);
      });
      ['mouseup', 'mouseleave'].forEach((eventName) => {
        logoWrap.addEventListener(eventName, clearVersionLongPress);
      });
    }
  </script>
