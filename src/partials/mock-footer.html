<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <style>
    :root {
      --bg: #f1edf2;
      --border: #ded7df;
      --active: #16b4b5;
      --inactive: #7a7680;
      --icon-stroke: currentColor;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 74px;
      overflow: hidden;
      background: var(--bg);
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--inactive);
    }

    .footer {
      height: 100%;
      border-top: 1px solid var(--border);
      padding: 3px 10px 5px;
    }

    .nav {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: center;
      justify-items: center;
      gap: 6px;
      transform: translateY(2px);
    }

    .item {
      width: 100%;
      display: grid;
      justify-items: center;
      gap: 1px;
      text-decoration: none;
      color: inherit;
      font-size: 13px;
      font-weight: 400;
      cursor: default;
      pointer-events: none;
      -webkit-tap-highlight-color: transparent;
    }

    .label {
      display: block;
      line-height: 1;
      margin-top: 0;
    }

    .item.active {
      color: var(--active);
    }

    .icon {
      width: 30px;
      height: 27px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
    }

    .icon svg {
      width: 100%;
      height: 100%;
      stroke: var(--icon-stroke);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon.icon-home {
      width: 30px;
      height: 30px;
    }

    .icon.icon-home svg {
      stroke: none;
      fill: none;
    }

    .icon.icon-chat {
      width: 30px;
      height: 30px;
    }

    .icon.icon-chat svg {
      stroke: none;
      fill: none;
    }

    .icon.icon-timeline {
      width: 30px;
      height: 30px;
    }

    .icon.icon-timeline svg {
      stroke: none;
      fill: none;
    }

    .icon.icon-notice {
      width: 30px;
      height: 30px;
    }

    .icon.icon-notice svg {
      stroke: none;
      fill: none;
    }
  </style>
</head>
