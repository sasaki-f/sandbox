<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Workplace 風タイムライン（モバイル）</title>
  <style>
    :root {
      --blue: #1877f2;
      --bg: #f0f2f5;
      --card: #ffffff;
      --text: #1c1e21;
      --subtle: #65676b;
      --border: #e4e6eb;
      --hover: #f2f3f5;
      --safe-bottom: max(14px, env(safe-area-inset-bottom));
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      max-width: 430px;
      margin-inline: auto;
      min-height: 100vh;
    }
    .topbar { position: sticky; top: 0; z-index: 20; background: var(--card); border-bottom: 1px solid var(--border); padding: 8px 12px 10px; }
    .topbar.no-search { padding-bottom: 0; }
    .top-menu { display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid var(--border); margin-bottom: 8px; }
    .topbar.no-search .top-menu { margin-bottom: 0; }
    .search-wrap { position: relative; }
    .search { width: 100%; border: none; border-radius: 999px; background: var(--bg); padding: 10px 42px 10px 14px; font-size: 14px; margin: 0; }
    .search.hidden { display: none; }
    .search-clear { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); width: 24px; height: 24px; border: none; border-radius: 50%; background: #666c74; color: #fff; font-size: 13px; line-height: 1; display: none; align-items: center; justify-content: center; padding: 0; }
    .search-clear.show { display: inline-flex; }
    .top-menu-item { border: none; background: transparent; color: #8a8d91; font-size: 21px; padding: 7px 0 8px; border-bottom: 3px solid transparent; display: inline-flex; align-items: center; justify-content: center; }
    .top-menu-item.active { color: #1c2c3f; border-bottom-color: #1c2c3f; }
    .top-menu-icon { width: 24px; height: 24px; display: inline-block; background-repeat: no-repeat; background-position: center; background-size: contain; filter: grayscale(100%); opacity: .86; }
    .top-menu-icon.work { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='2.6' y='2.6' width='18.8' height='18.8' rx='3.6' ry='3.6' fill='none' stroke='%2391969d' stroke-width='1.8'/><circle cx='7' cy='7.5' r='1.7' fill='none' stroke='%2391969d' stroke-width='1.8'/><path d='M10.3 7.5h7' fill='none' stroke='%2391969d' stroke-width='1.8' stroke-linecap='round'/><path d='M2.8 10.9h18.4' fill='none' stroke='%2391969d' stroke-width='1.8'/></svg>"); }
    .top-menu-icon.team { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><g fill='none' stroke='%2391969d' stroke-width='1.9' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='7.1' r='3.0'/><circle cx='5.2' cy='8.5' r='2.2'/><circle cx='18.8' cy='8.5' r='2.2'/><path d='M6.8 16.0c.7-1.8 2.6-2.8 5.2-2.8s4.5 1 5.2 2.8'/><path d='M2.7 16.2c.4-1.2 1.5-1.9 3-1.9'/><path d='M21.3 16.2c-.4-1.2-1.5-1.9-3-1.9'/></g></svg>"); }
    .top-menu-icon.bell { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 3.6c-2.5 0-4.5 2-4.5 4.5v3.3c0 .9-.3 1.8-.9 2.4L5.4 15c-.9 1-.2 2.6 1.2 2.6h10.8c1.4 0 2.1-1.6 1.2-2.6l-1.2-1.2c-.6-.6-.9-1.5-.9-2.4V8.1c0-2.5-2-4.5-4.5-4.5z' fill='none' stroke='%2391969d' stroke-width='1.8' stroke-linejoin='round'/><path d='M10.6 18.8c.3.9.9 1.4 1.4 1.4s1.1-.5 1.4-1.4' fill='none' stroke='%2391969d' stroke-width='1.8' stroke-linecap='round'/><path d='M11.2 3.8a.8.8 0 111.6 0' fill='none' stroke='%2391969d' stroke-width='1.8' stroke-linecap='round'/></svg>"); }
    .top-menu-item.notify { position: relative; }
    .top-badge { position: absolute; left: calc(50% + 6px); top: 1px; min-width: 17px; height: 17px; border-radius: 999px; background: #f04438; color: #fff; font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; padding: 0 4px; line-height: 1; }
    .feed { padding: 8px 10px 88px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
    .composer { padding: 12px; }
    .composer-top { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
    .avatar { width: 38px; height: 38px; border-radius: 50%; background: #cfd1d5; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; color: #3a3b3c; font-weight: 700; flex-shrink: 0; overflow: hidden; }
    .avatar.has-photo, .reader-avatar.has-photo { background: #e1e3e8; color: transparent; font-size: 0; }
    .avatar-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    
    .composer-input { flex: 1; border: none; background: var(--bg); border-radius: 999px; padding: 10px 12px; font-size: 14px; }
    .composer-target-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 12px; color: var(--subtle); margin-bottom: 8px; }
    .composer-target-select { border: 1px solid var(--border); background: #fff; border-radius: 10px; padding: 6px 8px; font-size: 12px; color: var(--text); }
    .composer-attach-preview { display: flex; gap: 8px; overflow-x: auto; margin: 0 0 8px; }
    .attach-chip { position: relative; width: 76px; height: 76px; border: 1px solid var(--border); border-radius: 10px; background: #f6f7f9; flex: 0 0 auto; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .attach-chip img, .attach-chip video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .attach-fallback { font-size: 11px; color: #5f6368; padding: 6px; text-align: center; line-height: 1.35; }
    .attach-remove { position: absolute; right: 4px; top: 4px; width: 18px; height: 18px; border: none; border-radius: 50%; background: rgba(0,0,0,.65); color: #fff; font-size: 11px; line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
    .feed-tabs { display: flex; gap: 6px; overflow-x: auto; margin: 2px 0 10px; padding-bottom: 2px; }
    .feed-tab { border: 1px solid var(--border); background: #fff; color: #4b4f56; border-radius: 999px; font-size: 12px; padding: 7px 10px; white-space: nowrap; display: inline-flex; align-items: center; gap: 4px; }
    .feed-tab.active { border-color: #1c2c3f; color: #1c2c3f; background: #eff4ff; }
    .mini-badge { font-size: 10px; color: #fff; background: var(--blue); border-radius: 999px; padding: 1px 5px; }
    .row-actions { border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 10px; }
    .post-actions { grid-template-columns: repeat(2, 1fr); }
    .action { text-align: center; color: var(--subtle); padding: 7px 4px; border-radius: 8px; font-size: 12px; font-weight: 700; border: none; background: transparent; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
    .action-icon { width: 18px; height: 18px; object-fit: cover; flex-shrink: 0; }
    .action:hover { background: var(--hover); }
    .post { padding: 12px; }
    .post-header { position: relative; display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; gap: 8px; }
    .post-header-main { display: flex; gap: 8px; align-items: center; min-width: 0; }
    .menu-wrap { position: relative; }
    .menu-btn { border: none; background: transparent; color: #8a8d91; font-size: 16px; line-height: 1; padding: 2px 4px; border-radius: 6px; }
    .menu-btn:hover { background: var(--hover); }
    .post-menu { position: absolute; right: 0; top: 24px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 8px 16px rgba(0,0,0,.12); min-width: 130px; display: none; z-index: 5; }
    .post-menu.open { display: block; }
    .menu-item-btn { width: 100%; border: none; background: transparent; text-align: left; font-size: 12px; color: var(--text); padding: 8px 10px; }
    .menu-item-btn:hover { background: var(--hover); }
    .post-meta b { font-size: 14px; }
    .post-meta small { font-size: 12px; color: var(--subtle); display: block; margin-top: 1px; }
    .badge { font-size: 11px; color: #fff; background: var(--blue); border-radius: 999px; padding: 2px 7px; margin-left: 4px; vertical-align: middle; }
    .post-content { font-size: 14px; line-height: 1.45; margin: 8px 0 8px; white-space: pre-wrap; }
    .post-content.collapsed { white-space: normal; }
    .more-inline { border: none; background: none; color: #9aa0a6; font-size: 14px; font-weight: 400; padding: 0; margin-left: 2px; white-space: nowrap; display: inline; }
    .post-media { width: 100%; min-height: 190px; border-radius: 10px; border: 1px solid var(--border); background: linear-gradient(120deg, #dfe8ff, #f7f9ff); display: flex; align-items: center; justify-content: center; color: #335; font-weight: 600; font-size: 13px; }
    .post-media-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 6px; }
    .post-media-item { position: relative; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; height: 88px; background: #f3f4f7; display: flex; align-items: center; justify-content: center; }
    .post-media-item img, .post-media-item video { width: 100%; height: 100%; object-fit: cover; }
    .post-media-file { font-size: 11px; color: #5f6368; text-align: center; padding: 6px; }
    .engagement-row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0 2px; color: var(--subtle); font-size: 12px; }
    .read-status { display: flex; align-items: center; }
    .read-count-btn { border: none; background: transparent; color: var(--subtle); font-size: 12px; text-decoration: underline; padding: 2px 0; }
    .engagement-right { display: flex; align-items: center; gap: 12px; }
    .engagement-link { border: none; background: transparent; color: var(--subtle); font-size: 12px; padding: 0; }
    .bottom-nav { position: fixed; left: 50%; bottom: 0; transform: translateX(-50%); width: min(430px, 100%); background: var(--card); border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(5, 1fr); padding: 6px 0 var(--safe-bottom); z-index: 30; }
    .bottom-item { text-align: center; color: var(--subtle); font-size: 11px; font-weight: 700; line-height: 1.3; }
    .bottom-item span { display: block; font-size: 18px; }
    .bottom-item.active { color: var(--blue); }

    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.35); display: none; z-index: 80; }
    .modal-backdrop.open { display: block; }
    .modal {
      position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: min(360px, calc(100% - 24px)); background: var(--card); border-radius: 12px; border: 1px solid var(--border);
      box-shadow: 0 12px 24px rgba(0,0,0,.18); display: none; z-index: 81; max-height: 70vh;
    }
    .modal.open { display: block; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); }
    .modal-title { font-size: 14px; font-weight: 700; }
    .modal-close { border: none; background: var(--bg); border-radius: 50%; width: 30px; height: 30px; }
    .reader-list { list-style: none; margin: 0; padding: 8px 12px 12px; overflow: auto; max-height: calc(70vh - 56px); }
    .reader-item { font-size: 13px; color: var(--text); padding: 8px 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .reader-avatar { width: 24px; height: 24px; border-radius: 50%; background: #d9dde3; color: #4b4f56; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; overflow: hidden; }
    .reader-item:last-child { border-bottom: none; }

    .comment-view { position: fixed; inset: 0; background: var(--card); z-index: 60; display: none; flex-direction: column; }
    .comment-view.open { display: flex; }
    .comment-header { min-height: 72px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; gap: 8px; }
    .comment-back, .comment-more { border: none; background: transparent; color: var(--text); font-size: 22px; line-height: 1; }
    .comment-header-main { display: flex; align-items: center; gap: 8px; min-width: 0; flex: 1; }
    .comment-header-meta b { font-size: 14px; }
    .comment-header-meta small { color: var(--subtle); font-size: 12px; display: block; margin-top: 2px; }
    .comment-body { flex: 1; overflow: auto; padding-bottom: 76px; }
    .single-post { border-bottom: 1px solid var(--border); }
    .single-post.post { padding: 12px; }
    .comment-list { padding: 0 10px 10px; }
    .comment-item { display: flex; gap: 8px; margin-bottom: 10px; }
    .comment-item[data-own="true"] { -webkit-touch-callout: none; user-select: none; }
    .comment-bubble { background: #eff1f4; border-radius: 14px; padding: 8px 10px; font-size: 14px; line-height: 1.35; }
    .comment-meta { color: var(--subtle); font-size: 12px; padding: 4px 2px 0; }
    .comment-input-wrap { position: fixed; left: 50%; transform: translateX(-50%); bottom: 0; width: min(430px, 100%); background: var(--card); border-top: 1px solid var(--border); padding: 8px 10px calc(8px + var(--safe-bottom)); display: flex; gap: 8px; align-items: center; }
    .comment-input { flex: 1; border: none; background: var(--bg); border-radius: 999px; padding: 10px 12px; font-size: 14px; }
    .send-btn { width: 34px; height: 34px; border: none; border-radius: 50%; background: #1b74e4; color: #fff; font-size: 16px; display: none; align-items: center; justify-content: center; }
    .send-btn.show { display: inline-flex; }
    .comment-edit-box { width: 100%; border: 1px solid #cfd2d8; border-radius: 12px; padding: 10px; font-size: 14px; line-height: 1.4; min-height: 88px; resize: vertical; background: #fff; }
    .comment-edit-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
    .comment-edit-cancel, .comment-edit-save { border: none; border-radius: 10px; padding: 8px 14px; font-size: 14px; font-weight: 700; }
    .comment-edit-cancel { background: #e4e6eb; color: #1c1e21; }
    .comment-edit-save { background: #1b74e4; color: #fff; }

    .comment-action-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.35); display: none; z-index: 90; }
    .comment-action-backdrop.open { display: block; }
    .comment-action-sheet { position: fixed; left: 50%; transform: translateX(-50%); bottom: 0; width: min(430px, 100%); background: var(--card); border-radius: 16px 16px 0 0; padding: 10px 10px calc(12px + var(--safe-bottom)); box-shadow: 0 -8px 20px rgba(0,0,0,.18); display: none; z-index: 91; }
    .comment-action-sheet.open { display: block; }
    .sheet-grip { width: 44px; height: 5px; border-radius: 999px; background: #c8cbd1; margin: 0 auto 10px; }
    .sheet-btn { width: 100%; border: none; background: transparent; text-align: left; font-size: 15px; line-height: 1.35; padding: 11px 8px; color: #1c1e21; display: flex; align-items: center; gap: 10px; }
    .sheet-btn:active { background: #f2f3f5; }
    .sheet-icon { width: 22px; height: 22px; display: inline-block; background-repeat: no-repeat; background-position: center; background-size: contain; flex-shrink: 0; }
    .sheet-icon.copy { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='9' y='4' width='11' height='15' rx='2.2' ry='2.2' fill='none' stroke='%23141414' stroke-width='1.9'/><rect x='4' y='9' width='11' height='11' rx='2.2' ry='2.2' fill='none' stroke='%23141414' stroke-width='1.9'/></svg>"); }
    .sheet-icon.delete { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M4 7h16' fill='none' stroke='%23141414' stroke-width='1.9' stroke-linecap='round'/><path d='M9.5 4.5h5' fill='none' stroke='%23141414' stroke-width='1.9' stroke-linecap='round'/><rect x='6.5' y='7' width='11' height='13' rx='2.2' ry='2.2' fill='none' stroke='%23141414' stroke-width='1.9'/></svg>"); }
    .sheet-icon.edit { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M4 20l4.1-1.1L19 8.1 15.9 5 5.1 15.9 4 20z' fill='none' stroke='%23141414' stroke-width='1.9' stroke-linejoin='round'/><path d='M13.9 7l3.1 3.1' fill='none' stroke='%23141414' stroke-width='1.9' stroke-linecap='round'/></svg>"); }
  </style>
</head>
<body>
  <header class="topbar">
    <nav class="top-menu" aria-label="上部メニュー">
      <button class="top-menu-item active" type="button" aria-label="ホーム"><span class="top-menu-icon work" aria-hidden="true"></span></button>
      <button class="top-menu-item" type="button" aria-label="チーム"><span class="top-menu-icon team" aria-hidden="true"></span></button>
      <button class="top-menu-item notify" type="button" aria-label="通知"><span class="top-menu-icon bell" aria-hidden="true"></span><span class="top-badge" aria-label="未読通知 1件">1</span></button>
      <button class="top-menu-item" type="button" aria-label="メニュー">☰</button>
    </nav>
    <div class="search-wrap">
      <input id="timeline-search" class="search" type="text" placeholder="タイムラインを検索" />
      <button id="timeline-search-clear" class="search-clear" type="button" aria-label="検索文字をクリア">✕</button>
    </div>
  </header>

  <main class="feed">
    <section id="feed-tabs" class="feed-tabs" aria-label="フィード切替"></section>
    <article class="card composer">
      <div class="composer-top">
        <span id="composer-avatar" class="avatar">や</span>
        <input id="composer-input" class="composer-input" placeholder="投稿を作成" />
      </div>
      <div class="composer-target-row">
        <span>投稿先</span>
        <select id="composer-target" class="composer-target-select" aria-label="投稿先を選択" required>
          <option value="" selected>グループを選択</option>
          <option value="hr">人事チーム（公式）</option>
          <option value="product">プロダクト本部</option>
          <option value="sales">営業部</option>
          <option value="pr">広報チーム</option>
        </select>
      </div>
      <div id="composer-attach-preview" class="composer-attach-preview"></div>
      <input id="composer-file-input" type="file" multiple hidden accept="image/*,video/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt" />
      <input id="composer-camera-input" type="file" hidden accept="image/*,video/*" capture="environment" />
      <div class="row-actions">
        <button id="composer-camera-btn" class="action" type="button">📷 カメラ</button>
        <button id="composer-attach-btn" class="action" type="button">📎 添付</button>
        <button id="composer-post-btn" class="action" type="button">投稿</button>
      </div>
    </article>
    <section id="posts"></section>
  </main>

  <nav class="bottom-nav" aria-label="モバイルナビゲーション">
    <div class="bottom-item active"><span>🏠</span>ホーム</div>
    <div class="bottom-item"><span>👥</span>グループ</div>
    <div class="bottom-item"><span>➕</span>投稿</div>
    <div class="bottom-item"><span>🔍</span>検索</div>
    <div class="bottom-item"><span>☰</span>メニュー</div>
  </nav>

  <div id="modal-backdrop" class="modal-backdrop" aria-hidden="true"></div>
  <div id="readers-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <div id="modal-title" class="modal-title">既読者一覧</div>
      <button id="modal-close" class="modal-close" aria-label="閉じる">✕</button>
    </div>
    <ul id="reader-list" class="reader-list"></ul>
  </div>



  <section id="comment-view" class="comment-view" aria-hidden="true">
    <header class="comment-header">
      <button id="comment-back" class="comment-back" type="button" aria-label="戻る">‹</button>
      <div class="comment-header-main">
        <div id="comment-header-avatar" class="avatar">SL</div>
        <div class="comment-header-meta">
          <b id="comment-header-title">営業部</b>
          <small id="comment-header-meta">すずき いちろう ・ 1時間前</small>
        </div>
      </div>
      <div class="menu-wrap">
        <button id="comment-header-menu" class="comment-more menu-btn" type="button" aria-label="メニュー">⋯</button>
        <div id="comment-header-popup" class="post-menu">
          <button id="comment-header-report" class="menu-item-btn" type="button">管理者に通報</button>
        </div>
      </div>
    </header>
    <div id="comment-body" class="comment-body"></div>
    <div class="comment-input-wrap">
      <input id="comment-input" class="comment-input" placeholder="コメントを入力..." />
      <button id="comment-send" class="send-btn" type="button" aria-label="送信">▶</button>
    </div>
  </section>


  <div id="comment-action-backdrop" class="comment-action-backdrop"></div>
  <div id="comment-action-sheet" class="comment-action-sheet" aria-hidden="true">
    <div class="sheet-grip"></div>
    <button id="comment-copy" class="sheet-btn" type="button"><span class="sheet-icon copy" aria-hidden="true"></span>コピー</button>
    <button id="comment-delete" class="sheet-btn" type="button"><span class="sheet-icon delete" aria-hidden="true"></span>削除</button>
    <button id="comment-edit" class="sheet-btn" type="button"><span class="sheet-icon edit" aria-hidden="true"></span>編集</button>
  </div>

  <script>

    const topbar = document.querySelector('.topbar');
    const commentCopy = document.getElementById('comment-copy');
    const commentDelete = document.getElementById('comment-delete');
    const commentEdit = document.getElementById('comment-edit');

    let currentCommentPostId = null;
    let selectedOwnCommentIndex = null;
    let editingCommentIndex = null;
    let longPressTimer = null;
    let loadedPostCount = 0;
    let isLoadingMore = false;
    let currentSearchQuery = "";
    let currentFeedId = 'all';
    let composerAttachments = [];



    function syncTopbarSearchVisibility() {
      const activeMenuIndex = topMenuItems.findIndex((item) => item.classList.contains('active'));
      const showSearch = activeMenuIndex === 0;
      timelineSearch.classList.toggle('hidden', !showSearch);
      topbar.classList.toggle('no-search', !showSearch);
    }

    topMenuItems.forEach((item) => {
      item.addEventListener('click', () => {
        topMenuItems.forEach((btn) => btn.classList.remove('active'));
        item.classList.add('active');
        syncTopbarSearchVisibility();
      });
    });

    syncTopbarSearchVisibility();

    function initialsOf(name) {
      return name.split(' ').map((part) => part[0]).join('').slice(0, 2);
    }

    function buildAvatarDataUri(meta) {
      const source = ATTACHED_PORTRAITS[meta.photo];
      if (!source) return null;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><defs><clipPath id="c"><circle cx="32" cy="32" r="30"/></clipPath></defs><g clip-path="url(#c)"><image href="${source}" x="0" y="0" width="64" height="64" preserveAspectRatio="xMidYMid slice"/></g></svg>`;
      return `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;
    }

    const USER_AVATAR_SVG = Object.fromEntries(
      Object.entries(USER_AVATAR_META).map(([name, meta]) => [name, buildAvatarDataUri(meta)])
    );

    function photoDataUriFor(name) {
      return USER_AVATAR_SVG[name] || null;
    }

    function avatarHtmlByName(name, cls = 'avatar') {
      const photo = photoDataUriFor(name);
      const initials = initialsOf(name);
      if (photo) {
        return `<span class="${cls} has-photo"><img class="avatar-img" src="${photo}" alt="${escapeHtml(name)}" /></span>`;
      }
      return `<span class="${cls}">${escapeHtml(initials)}</span>`;
    }

    function applyAvatarToElement(el, name) {
      const photo = photoDataUriFor(name);
      if (photo) {
        el.classList.add('has-photo');
        el.innerHTML = `<img class="avatar-img" src="${photo}" alt="${escapeHtml(name)}" />`;
      } else {
        el.classList.remove('has-photo');
        el.textContent = initialsOf(name);
      }
    }

    applyAvatarToElement(document.getElementById('composer-avatar'), CURRENT_USER);


    function feedMetaById(feedId) {
      return FEEDS.find((feed) => feed.id === feedId) || FEEDS[0];
    }

    function renderPostMedia(post) {
      if (post.attachments && post.attachments.length > 0) {
        const items = post.attachments.map((item) => {
          if (item.type.startsWith('image/')) {
            return `<div class="post-media-item"><img src="${item.url}" alt="${escapeHtml(item.name)}" /></div>`;
          }
          if (item.type.startsWith('video/')) {
            return `<div class="post-media-item"><video src="${item.url}" muted playsinline></video></div>`;
          }
          return `<div class="post-media-item"><div class="post-media-file">${escapeHtml(item.name)}</div></div>`;
        }).join('');
        return `<div class="post-media-grid">${items}</div>`;
      }
      return post.media ? `<div class="post-media">${escapeHtml(post.media)}</div>` : '';
    }

    function renderFeedTabs() {
      feedTabs.innerHTML = FEEDS.map((feed) => `
        <button class="feed-tab ${feed.id === currentFeedId ? 'active' : ''}" type="button" data-feed-id="${feed.id}">
          ${escapeHtml(feed.name)}${feed.official ? ' <span class="mini-badge">公式</span>' : ''}
        </button>
      `).join('');
    }

    function renderComposerAttachments() {
      composerAttachPreview.innerHTML = composerAttachments.map((item) => {
        let body = `<div class="attach-fallback">${escapeHtml(item.file.name)}</div>`;
        if (item.file.type.startsWith('image/')) {
          body = `<img src="${item.url}" alt="${escapeHtml(item.file.name)}" />`;
        } else if (item.file.type.startsWith('video/')) {
          body = `<video src="${item.url}" muted playsinline></video>`;
        }
        return `<div class="attach-chip">${body}<button class="attach-remove" type="button" data-attach-id="${item.id}" aria-label="添付を削除">✕</button></div>`;
      }).join('');
    }

    function addComposerFiles(fileList) {
      const items = Array.from(fileList || []);
      items.forEach((file) => {
        const id = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
        const url = URL.createObjectURL(file);
        composerAttachments.push({ id, file, url });
      });
      renderComposerAttachments();
    }

    function makePostCard(post) {
      const card = document.createElement('article');
      card.className = 'card post';
      card.innerHTML = `
        <div class="post-header">
          <div class="post-header-main">
            ${avatarHtmlByName(post.author.user, "avatar")}
            <div class="post-meta">
              <b>${post.author.team}${post.author.official ? ' <span class="badge">公式</span>' : ''}</b>
              <small>${post.author.user} ・ ${formatTimestamp(post.hoursAgo)} ・ ${feedMetaById(post.feedId).name}</small>
            </div>
          </div>
          <div class="menu-wrap">
            <button class="menu-btn" type="button" title="メニュー" aria-label="メニュー" data-menu-id="${post.id}">⋯</button>
            <div class="post-menu" data-menu="${post.id}">
              <button class="menu-item-btn report-action" type="button" data-report-id="${post.id}">管理者に通報</button>
            </div>
          </div>
        </div>
        <div class="post-content" data-full="${escapeHtml(post.content)}">${escapeHtml(post.content)}</div>
        ${renderPostMedia(post)}
        <div class="engagement-row">
          <div class="read-status">
            <button type="button" class="read-count-btn" data-readers="${escapeHtml(JSON.stringify(post.readers))}">既読 ${post.readers.length}</button>
          </div>
          <div class="engagement-right">
            ${post.commentCount > 0 ? `<button type="button" class="engagement-link comment-count-link" data-post-id="${post.id}">コメント ${post.commentCount}件</button>` : ''}
            ${post.shareCount > 0 ? `<button type="button" class="engagement-link share-count-link" data-post-id="${post.id}">シェア ${post.shareCount}件</button>` : ''}
          </div>
        </div>
        <div class="row-actions post-actions">
          <button class="action comment-action" type="button" data-post-id="${post.id}"><img class="action-icon" alt="コメント" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M3 11.5c0 4.5 4.3 8 9.5 8 1.2 0 2.3-.2 3.4-.6l5.1 1.1-1.5-4.1c.9-1.2 1.5-2.7 1.5-4.4 0-4.5-4.3-8-9.5-8S3 7 3 11.5z' fill='none' stroke='%236c7077' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'/></svg>" />コメントする</button>
          <button class="action share-action" type="button" data-post-id="${post.id}"><img class="action-icon" alt="シェア" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M15 6l7 7-7 7v-4c-5 0-9 1-13 4 2-6 6-10 13-11V6z' fill='none' stroke='%236c7077' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'/></svg>" />シェア</button>
        </div>
      `;
      return card;
    }

    function applyMoreToggle(card) {
      const contentEl = card.querySelector('.post-content');
      if (!contentEl) return;
      const fullText = contentEl.dataset.full || '';
      contentEl.textContent = fullText;
      const lineHeight = parseFloat(getComputedStyle(contentEl).lineHeight) || 20;
      const maxHeight = lineHeight * 4;
      if (contentEl.scrollHeight <= maxHeight + 1) {
        contentEl.classList.remove('collapsed');
        return;
      }

      const normalized = fullText.replaceAll('\n', ' ');
      let low = 0;
      let high = normalized.length;
      let best = 0;
      while (low <= high) {
        const mid = Math.floor((low + high) / 2);
        contentEl.textContent = `${normalized.slice(0, mid).trimEnd()}... もっと見る`;
        if (contentEl.scrollHeight <= maxHeight + 1) {
          best = mid;
          low = mid + 1;
        } else {
          high = mid - 1;
        }
      }

      contentEl.classList.add('collapsed');
      contentEl.textContent = `${normalized.slice(0, best).trimEnd()}...`;
      const moreBtn = document.createElement('button');
      moreBtn.className = 'more-inline';
      moreBtn.type = 'button';
      moreBtn.textContent = 'もっと見る';
      contentEl.appendChild(document.createTextNode(' '));
      contentEl.appendChild(moreBtn);
    }

    function escapeHtml(text) {
      return text
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }



    function formatDateTimeJa(date) {
      const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
      const y = date.getFullYear();
      const m = date.getMonth() + 1;
      const d = date.getDate();
      const w = weekdays[date.getDay()];
      const hh = String(date.getHours()).padStart(2, '0');
      const mm = String(date.getMinutes()).padStart(2, '0');
      return `${y}年${m}月${d}日（${w}）${hh}:${mm}`;
    }

    function formatTimestamp(hoursAgo) {
      if (hoursAgo < 24) return `${hoursAgo}時間前`;
      const now = new Date();
      const target = new Date(now.getTime() - hoursAgo * 60 * 60 * 1000);
      return formatDateTimeJa(target);
    }

    function formatRelativeCommentTimestamp(createdAt) {
      const nowMs = Date.now();
      const diffSec = Math.max(0, Math.floor((nowMs - createdAt) / 1000));
      if (diffSec < 60) {
        const sec = Math.max(1, diffSec);
        return `${sec}秒前`;
      }
      const diffMin = Math.floor(diffSec / 60);
      if (diffMin < 60) return `${diffMin}分前`;
      const diffHour = Math.floor(diffMin / 60);
      if (diffHour < 24) return `${diffHour}時間前`;
      return formatDateTimeJa(new Date(createdAt));
    }

    function openReadersModal(readers) {
      readerList.innerHTML = readers.map((name) => {
        return `<li class="reader-item">${avatarHtmlByName(name, 'reader-avatar')}<span>${escapeHtml(name)}</span></li>`;
      }).join('');
      modal.classList.add('open');
      backdrop.classList.add('open');
    }

    function closeReadersModal() {
      modal.classList.remove('open');
      backdrop.classList.remove('open');
    }



    function renderCommentView(post) {
      const commentsHtml = post.comments.map((c, idx) => {
        const isOwn = c.user === CURRENT_USER;
        const displayName = isOwn ? `${c.user}（自分）` : c.user;
        const avatarText = initialsOf(c.user);

        if (isOwn && editingCommentIndex === idx) {
          return `
        <div class="comment-item" data-comment-index="${idx}" data-own="true">
          ${avatarHtmlByName(c.user, "avatar")}
          <div style="min-width:0; flex:1;">
            <textarea class="comment-edit-box" data-edit-input="${idx}">${escapeHtml(c.text)}</textarea>
            <div class="comment-edit-actions">
              <button class="comment-edit-cancel" type="button" data-edit-cancel="${idx}">キャンセル</button>
              <button class="comment-edit-save" type="button" data-edit-save="${idx}">更新</button>
            </div>
          </div>
        </div>
      `;
        }

        return `
        <div class="comment-item" data-comment-index="${idx}" data-own="${isOwn ? 'true' : 'false'}">
          ${avatarHtmlByName(c.user, "avatar")}
          <div style="min-width:0;">
            <div class="comment-bubble"><b>${escapeHtml(displayName)}</b><br>${escapeHtml(c.text)}</div>
            <div class="comment-meta">${escapeHtml(formatRelativeCommentTimestamp(c.createdAt))}${c.edited ? ' ・ 編集済み' : ''}</div>
          </div>
        </div>
      `;
      }).join('');

      currentCommentPostId = post.id;
      selectedOwnCommentIndex = null;
      commentActionSheet.classList.remove('open');
      commentActionBackdrop.classList.remove('open');

      applyAvatarToElement(commentHeaderAvatar, post.author.user);
      commentHeaderTitle.innerHTML = `${escapeHtml(post.author.team)}${post.author.official ? ' <span class="badge">公式</span>' : ''}`;
      commentHeaderMeta.textContent = `${post.author.user} ・ ${formatTimestamp(post.hoursAgo)}`;

      const fullCard = makePostCard(post);
      const postHeader = fullCard.querySelector('.post-header');
      if (postHeader) postHeader.remove();

      commentBody.innerHTML = `
        <article class="single-post post">
          ${fullCard.innerHTML}
        </article>
        <div class="comment-list">${commentsHtml}</div>
      `;
      const singlePost = commentBody.querySelector('.single-post');
      if (singlePost) applyMoreToggle(singlePost);

      const actionRow = commentBody.querySelector('.post-actions');
      if (actionRow) {
        const btn = actionRow.querySelector('.comment-action');
        if (btn) btn.disabled = true;
      }

      commentView.classList.add('open');
      commentView.setAttribute('aria-hidden', 'false');
      document.querySelector('.bottom-nav').style.display = 'none';
    }

    function closeCommentView() {
      commentView.classList.remove('open');
      commentView.setAttribute('aria-hidden', 'true');
      document.querySelector('.bottom-nav').style.display = '';
      commentInput.value = '';
      commentSend.classList.remove('show');
      commentHeaderPopup.classList.remove('open');
      selectedOwnCommentIndex = null;
      editingCommentIndex = null;
      commentActionSheet.classList.remove('open');
      commentActionBackdrop.classList.remove('open');
    }


    function findCurrentPost() {
      return posts.find((p) => p.id === currentCommentPostId);
    }

    function openCommentActionMenu(commentIndex) {
      selectedOwnCommentIndex = commentIndex;
      commentActionBackdrop.classList.add('open');
      commentActionSheet.classList.add('open');
      commentActionSheet.setAttribute('aria-hidden', 'false');
    }

    function closeCommentActionMenu() {
      selectedOwnCommentIndex = null;
      commentActionBackdrop.classList.remove('open');
      commentActionSheet.classList.remove('open');
      commentActionSheet.setAttribute('aria-hidden', 'true');
    }

    async function copyTextToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const tmp = document.createElement('textarea');
        tmp.value = text;
        document.body.appendChild(tmp);
        tmp.select();
        document.execCommand('copy');
        tmp.remove();
      }
    }

    function getFilteredPosts() {
      const feedScopedPosts = currentFeedId === 'all'
        ? posts
        : posts.filter((post) => post.feedId === currentFeedId);
      if (!currentSearchQuery) return feedScopedPosts;
      return feedScopedPosts.filter((post) => post.content.toLowerCase().includes(currentSearchQuery));
    }

    function rerenderTimeline() {
      renderFeedTabs();
      postsRoot.innerHTML = '';
      getFilteredPosts().forEach((post) => {
        const card = makePostCard(post);
        postsRoot.appendChild(card);
        applyMoreToggle(card);
      });
    }

    function loadMorePosts() {
      if (isLoadingMore) return;
      isLoadingMore = true;
      const start = loadedPostCount;
      const end = start + PAGE_SIZE;
      for (let i = start; i < end; i += 1) {
        const post = createMockPost(i);
        posts.push(post);
      }
      loadedPostCount = end;
      isLoadingMore = false;
      rerenderTimeline();
    }

    function maybeLoadOlderPosts() {
      if (commentView.classList.contains('open')) return;
      const nearBottom = window.innerHeight + window.scrollY >= document.body.offsetHeight - 240;
      if (nearBottom) {
        loadMorePosts();
      }
    }

    loadMorePosts();
    function handlePostAreaClick(event) {
      const moreBtn = event.target.closest('.more-inline');
      if (moreBtn) {
        const contentEl = moreBtn.closest('.post-content');
        if (!contentEl) return;
        contentEl.textContent = contentEl.dataset.full;
        contentEl.classList.remove('collapsed');
        return;
      }

      const menuBtn = event.target.closest('.menu-btn');
      if (menuBtn) {
        const menuId = menuBtn.dataset.menuId;
        document.querySelectorAll('.post-menu').forEach((el) => {
          if (el.dataset.menu === menuId) {
            el.classList.toggle('open');
          } else {
            el.classList.remove('open');
          }
        });
        return;
      }

      const reportAction = event.target.closest('.report-action');
      if (reportAction) {
        alert(`投稿 #${reportAction.dataset.reportId} を管理者に通報しました`);
        document.querySelectorAll('.post-menu').forEach((el) => el.classList.remove('open'));
        return;
      }

      const commentBtn = event.target.closest('.comment-action, .comment-count-link');
      if (commentBtn) {
        const post = posts.find((p) => String(p.id) === commentBtn.dataset.postId);
        if (post) renderCommentView(post);
        return;
      }

      const shareBtn = event.target.closest('.share-action, .share-count-link');
      if (shareBtn) {
        alert(`投稿 #${shareBtn.dataset.postId} をシェアしました`);
        return;
      }

      const readBtn = event.target.closest('.read-count-btn');
      if (!readBtn) return;
      const readers = JSON.parse(readBtn.dataset.readers);
      openReadersModal(readers);
    }

    postsRoot.addEventListener('click', handlePostAreaClick);
    commentBody.addEventListener('click', handlePostAreaClick);

    commentBody.addEventListener('pointerdown', (event) => {
      const item = event.target.closest('.comment-item[data-own="true"]');
      if (!item || editingCommentIndex !== null) return;
      const idx = Number(item.dataset.commentIndex);
      longPressTimer = setTimeout(() => openCommentActionMenu(idx), 450);
    });
    ['pointerup', 'pointerleave', 'pointercancel', 'pointermove'].forEach((evt) => {
      commentBody.addEventListener(evt, () => {
        if (longPressTimer) {
          clearTimeout(longPressTimer);
          longPressTimer = null;
        }
      });
    });

    commentBody.addEventListener('contextmenu', (event) => {
      if (event.target.closest('.comment-item[data-own="true"]')) {
        event.preventDefault();
      }
    });
    document.addEventListener('contextmenu', (event) => {
      const inMockUi = event.target.closest('.feed') || event.target.closest('.comment-view') || event.target.closest('.comment-action-sheet');
      const isCommentUiOpen = commentView.classList.contains('open') || commentActionSheet.classList.contains('open');
      if (inMockUi || isCommentUiOpen) {
        event.preventDefault();
      }
    }, true);

    commentActionBackdrop.addEventListener('click', closeCommentActionMenu);
    commentCopy.addEventListener('click', async () => {
      const post = findCurrentPost();
      if (!post || selectedOwnCommentIndex === null) return;
      const target = post.comments[selectedOwnCommentIndex];
      if (!target) return;
      await copyTextToClipboard(target.text);
      closeCommentActionMenu();
      alert('コメントをコピーしました');
    });
    commentDelete.addEventListener('click', () => {
      const post = findCurrentPost();
      if (!post || selectedOwnCommentIndex === null) return;
      if (!post.comments[selectedOwnCommentIndex]) return;
      post.comments.splice(selectedOwnCommentIndex, 1);
      post.commentCount = post.comments.length;
      editingCommentIndex = null;
      closeCommentActionMenu();
      rerenderTimeline();
      renderCommentView(post);
    });
    commentEdit.addEventListener('click', () => {
      const post = findCurrentPost();
      if (!post || selectedOwnCommentIndex === null) return;
      if (!post.comments[selectedOwnCommentIndex]) return;
      editingCommentIndex = selectedOwnCommentIndex;
      closeCommentActionMenu();
      renderCommentView(post);
    });

    commentBody.addEventListener('click', (event) => {
      const cancelBtn = event.target.closest('[data-edit-cancel]');
      if (cancelBtn) {
        editingCommentIndex = null;
        const post = findCurrentPost();
        if (post) renderCommentView(post);
        return;
      }

      const saveBtn = event.target.closest('[data-edit-save]');
      if (saveBtn) {
        const idx = Number(saveBtn.dataset.editSave);
        const input = commentBody.querySelector(`[data-edit-input="${idx}"]`);
        const post = findCurrentPost();
        if (!post || !input) return;
        const nextText = input.value.trim();
        if (!nextText) {
          alert('コメント内容を入力してください');
          return;
        }
        post.comments[idx].text = nextText;
        post.comments[idx].edited = true;
        editingCommentIndex = null;
        renderCommentView(post);
      }
    });


    modalClose.addEventListener('click', closeReadersModal);
    backdrop.addEventListener('click', closeReadersModal);

    timelineSearch.addEventListener('input', () => {
      currentSearchQuery = timelineSearch.value.trim().toLowerCase();
      timelineSearchClear.classList.toggle('show', timelineSearch.value.length > 0);
      rerenderTimeline();
    });

    timelineSearchClear.addEventListener('click', () => {
      timelineSearch.value = '';
      currentSearchQuery = '';
      timelineSearchClear.classList.remove('show');
      rerenderTimeline();
      timelineSearch.focus();
    });


    feedTabs.addEventListener('click', (event) => {
      const tab = event.target.closest('[data-feed-id]');
      if (!tab) return;
      currentFeedId = tab.dataset.feedId;
      rerenderTimeline();
    });

    composerAttachBtn.addEventListener('click', () => composerFileInput.click());
    composerCameraBtn.addEventListener('click', () => composerCameraInput.click());

    composerFileInput.addEventListener('change', () => {
      addComposerFiles(composerFileInput.files);
      composerFileInput.value = '';
    });
    composerCameraInput.addEventListener('change', () => {
      addComposerFiles(composerCameraInput.files);
      composerCameraInput.value = '';
    });

    composerAttachPreview.addEventListener('click', (event) => {
      const removeBtn = event.target.closest('[data-attach-id]');
      if (!removeBtn) return;
      const target = composerAttachments.find((item) => item.id === removeBtn.dataset.attachId);
      if (target) URL.revokeObjectURL(target.url);
      composerAttachments = composerAttachments.filter((item) => item.id !== removeBtn.dataset.attachId);
      renderComposerAttachments();
    });

    composerPostBtn.addEventListener('click', () => {
      const text = composerInput.value.trim();
      if (!text && composerAttachments.length === 0) {
        alert('投稿内容または添付ファイルを入力してください');
        return;
      }
      if (!composerTarget.value) {
        alert('投稿先のグループを選択してください');
        return;
      }
      const selectedFeed = feedMetaById(composerTarget.value);
      const newId = posts.length ? Math.max(...posts.map((post) => post.id)) + 1 : 1;
      const author = authors.find((item) => item.user === CURRENT_USER) || authors[0];
      const attachmentPayload = composerAttachments.map((item) => ({
        name: item.file.name,
        type: item.file.type || 'application/octet-stream',
        url: item.url,
      }));
      posts.unshift({
        id: newId,
        author,
        feedId: selectedFeed.id,
        hoursAgo: 0,
        content: text || '（添付のみの投稿）',
        media: '',
        attachments: attachmentPayload,
        readers: [CURRENT_USER],
        commentCount: 0,
        shareCount: 0,
        comments: [],
      });
      composerInput.value = '';
      composerAttachments = [];
      renderComposerAttachments();
      currentFeedId = selectedFeed.id;
      rerenderTimeline();
    });

    commentBack.addEventListener('click', closeCommentView);
    commentInput.addEventListener('input', () => {
      const hasText = commentInput.value.trim().length > 0;
      commentSend.classList.toggle('show', hasText);
    });
    commentSend.addEventListener('click', () => {
      const nextText = commentInput.value.trim();
      if (!nextText) return;
      const post = findCurrentPost();
      if (!post) return;
      post.comments.push({ user: CURRENT_USER, text: nextText, createdAt: Date.now(), edited: false });
      post.commentCount = post.comments.length;
      commentInput.value = '';
      commentSend.classList.remove('show');
      commentHeaderPopup.classList.remove('open');
      selectedOwnCommentIndex = null;
      editingCommentIndex = null;
      commentActionSheet.classList.remove('open');
      commentActionBackdrop.classList.remove('open');
      rerenderTimeline();
      renderCommentView(post);
    });
    commentHeaderMenu.addEventListener('click', (event) => {
      event.stopPropagation();
      commentHeaderPopup.classList.toggle('open');
    });
    commentHeaderReport.addEventListener('click', () => {
      alert('管理者に通報しました');
      commentHeaderPopup.classList.remove('open');
      selectedOwnCommentIndex = null;
      editingCommentIndex = null;
      commentActionSheet.classList.remove('open');
      commentActionBackdrop.classList.remove('open');
    });

    document.addEventListener('click', (event) => {
      if (!event.target.closest('.menu-wrap')) {
        document.querySelectorAll('.post-menu').forEach((el) => el.classList.remove('open'));
        commentHeaderPopup.classList.remove('open');
      }
      if (!event.target.closest('.comment-action-sheet') && !event.target.closest('.comment-item[data-own="true"]')) {
        closeCommentActionMenu();
      }
    });
    window.addEventListener('scroll', maybeLoadOlderPosts, { passive: true });
  </script>
</body>
</html>
