<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Workplace 風タイムライン（モバイル）</title>
  <style>
    :root {
      --blue: #1877f2;
      --bg: #f0f2f5;
      --card: #ffffff;
      --text: #1c1e21;
      --subtle: #65676b;
      --border: #e4e6eb;
      --hover: #f2f3f5;
      --safe-bottom: max(14px, env(safe-area-inset-bottom));
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      max-width: 430px;
      margin-inline: auto;
      min-height: 100vh;
    }
    .topbar { position: sticky; top: 0; z-index: 20; background: var(--card); border-bottom: 1px solid var(--border); padding: 8px 12px 10px; }
    .topbar.no-search { padding-bottom: 0; }
    .top-menu { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid var(--border); margin-bottom: 8px; }
    .topbar.no-search .top-menu { margin-bottom: 0; }
    .search-wrap { position: relative; }
    .search { width: 100%; border: none; border-radius: 999px; background: var(--bg); padding: 10px 42px 10px 14px; font-size: 14px; margin: 0; }
    .search.hidden { display: none; }
    .search-clear { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); width: 24px; height: 24px; border: none; border-radius: 50%; background: #666c74; color: #fff; font-size: 13px; line-height: 1; display: none; align-items: center; justify-content: center; padding: 0; }
    .search-clear.show { display: inline-flex; }
    .top-menu-item { border: none; background: transparent; color: #8a8d91; font-size: 21px; padding: 7px 0 8px; border-bottom: 3px solid transparent; display: inline-flex; align-items: center; justify-content: center; }
    .top-menu-item.active { color: #1c2c3f; border-bottom-color: #1c2c3f; }
    .top-menu-icon { width: 24px; height: 24px; display: inline-block; background-repeat: no-repeat; background-position: center; background-size: contain; filter: grayscale(100%); opacity: .86; }
    .top-menu-icon.work { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='2.6' y='2.6' width='18.8' height='18.8' rx='3.6' ry='3.6' fill='none' stroke='%2391969d' stroke-width='1.8'/><circle cx='7' cy='7.5' r='1.7' fill='none' stroke='%2391969d' stroke-width='1.8'/><path d='M10.3 7.5h7' fill='none' stroke='%2391969d' stroke-width='1.8' stroke-linecap='round'/><path d='M2.8 10.9h18.4' fill='none' stroke='%2391969d' stroke-width='1.8'/></svg>"); }
    .top-menu-icon.team { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><g fill='none' stroke='%2391969d' stroke-width='1.9' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='7.1' r='3.0'/><circle cx='5.2' cy='8.5' r='2.2'/><circle cx='18.8' cy='8.5' r='2.2'/><path d='M6.8 16.0c.7-1.8 2.6-2.8 5.2-2.8s4.5 1 5.2 2.8'/><path d='M2.7 16.2c.4-1.2 1.5-1.9 3-1.9'/><path d='M21.3 16.2c-.4-1.2-1.5-1.9-3-1.9'/></g></svg>"); }
    .top-menu-icon.bell { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 3.6c-2.5 0-4.5 2-4.5 4.5v3.3c0 .9-.3 1.8-.9 2.4L5.4 15c-.9 1-.2 2.6 1.2 2.6h10.8c1.4 0 2.1-1.6 1.2-2.6l-1.2-1.2c-.6-.6-.9-1.5-.9-2.4V8.1c0-2.5-2-4.5-4.5-4.5z' fill='none' stroke='%2391969d' stroke-width='1.8' stroke-linejoin='round'/><path d='M10.6 18.8c.3.9.9 1.4 1.4 1.4s1.1-.5 1.4-1.4' fill='none' stroke='%2391969d' stroke-width='1.8' stroke-linecap='round'/><path d='M11.2 3.8a.8.8 0 111.6 0' fill='none' stroke='%2391969d' stroke-width='1.8' stroke-linecap='round'/></svg>"); }
    .top-menu-item.notify { position: relative; }
    .top-badge { position: absolute; left: calc(50% + 6px); top: 1px; min-width: 17px; height: 17px; border-radius: 999px; background: #f04438; color: #fff; font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; padding: 0 4px; line-height: 1; }
    .feed { padding: 8px 10px 88px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
    .composer { padding: 12px; }
    .composer-top { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
    .avatar { width: 38px; height: 38px; border-radius: 50%; background: #cfd1d5; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; color: #3a3b3c; font-weight: 700; flex-shrink: 0; overflow: hidden; }
    .avatar.has-photo, .reader-avatar.has-photo, .shared-source-avatar.has-photo, .app-dialog-share-avatar.has-photo { background: #e1e3e8; color: transparent; font-size: 0; }
    .avatar-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    
    .composer-input { flex: 1; border: 1px solid #d0d7e2; background: var(--bg); border-radius: 18px; padding: 10px 12px; font-size: 14px; line-height: 1.45; min-height: 44px; max-height: 160px; resize: vertical; overflow-y: auto; outline: none; }
    .composer-input:focus { border-color: #1b74e4; box-shadow: 0 0 0 2px rgba(27, 116, 228, 0.18); }
    .composer-target-row { display: flex; align-items: center; justify-content: flex-end; gap: 8px; font-size: 12px; color: var(--subtle); margin-bottom: 8px; }
    .composer-target-label { text-align: right; min-width: 56px; }
    .composer-target-select { border: 1px solid var(--border); background: #fff; border-radius: 10px; padding: 6px 8px; font-size: 12px; color: var(--text); }
    .composer-attach-preview { display: flex; gap: 8px; overflow-x: auto; margin: 0 0 8px; }
    .attach-chip { position: relative; width: 76px; height: 76px; border: 1px solid var(--border); border-radius: 10px; background: #f6f7f9; flex: 0 0 auto; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .attach-chip img, .attach-chip video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .attach-video-fallback { width: 100%; height: 100%; background: linear-gradient(135deg, #dfe3ea, #cfd6e2); }
    .attach-fallback { font-size: 11px; color: #5f6368; padding: 6px; text-align: center; line-height: 1.35; }
    .attach-remove { position: absolute; right: 4px; top: 4px; width: 18px; height: 18px; border: none; border-radius: 50%; background: rgba(0,0,0,.65); color: #fff; font-size: 11px; line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
    .feed-tabs { display: flex; gap: 6px; overflow-x: auto; margin: 2px 0 10px; padding-bottom: 2px; }
    .feed-tab { border: 1px solid var(--border); background: #fff; color: #4b4f56; border-radius: 999px; font-size: 12px; padding: 7px 10px; white-space: nowrap; display: inline-flex; align-items: center; gap: 4px; }
    .feed-tab.active { border-color: #1c2c3f; color: #1c2c3f; background: #eff4ff; }
    .groups-view { display: none; margin-top: 2px; }
    .groups-view.show { display: block; }
    .group-search-wrap { margin-bottom: 8px; }
    .group-search { width: 100%; border: 1px solid var(--border); border-radius: 999px; background: #fff; padding: 9px 12px; font-size: 13px; color: var(--text); }
    .group-create-wrap { display: flex; justify-content: flex-end; margin: 0 0 8px; }
    .group-create-btn { border: none; background: #3f6fcc; color: #fff; border-radius: 999px; font-size: 12px; font-weight: 700; padding: 6px 12px; display: inline-flex; align-items: center; gap: 7px; }
    .group-create-btn::before { content: '+'; font-size: 20px; line-height: 1; font-weight: 500; transform: translateY(-1px); }
    .group-empty { font-size: 12px; color: #6f7782; padding: 6px 2px 2px; }
    .group-panel { padding: 8px 10px; overflow: visible; }
    .group-heading-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin: 2px 0 8px; }
    .group-heading { font-size: 12px; color: #67707a; font-weight: 700; margin: 0; }
    .group-heading-actions { display: inline-flex; align-items: center; gap: 6px; }
    .group-sort-cancel { border: 1px solid #cfd5de; background: #fff; color: #445064; border-radius: 999px; font-size: 11px; font-weight: 700; padding: 4px 10px; display: none; }
    .group-sort-cancel.show { display: inline-block; }
    .group-sort-cancel.active { color: #fff; border-color: #3e68d7; background: #4f79e9; }
    .group-list { list-style: none; margin: 0; padding: 0; }
    .group-item { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 8px 2px; border-bottom: 1px solid var(--border); }
    .group-item.menu-open { position: relative; z-index: 12; }
    .group-item:last-child { border-bottom: none; }
    .group-item-main { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .group-item.sortable { touch-action: none; cursor: grab; }
    .group-item.sortable, .group-item.sortable * { user-select: none; -webkit-user-select: none; }
    .group-item.sortable.dragging { opacity: .55; background: #f5f8ff; }
    .group-icon { width: 36px; height: 36px; border-radius: 50%; background: #dbe3f5; color: #2f3e56; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; overflow: hidden; }
    .group-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .group-meta { min-width: 0; color: #20252b; font-size: 14px; font-weight: 600; }
    .group-name { display: inline-block; max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; vertical-align: middle; }
    .group-count { color: #5f6670; font-weight: 500; margin-left: 4px; }
    .group-official { display: inline-block; font-size: 10px; color: #fff; background: var(--blue); border-radius: 999px; padding: 1px 6px; margin-left: 6px; vertical-align: middle; }
    .group-admin { display: inline-block; font-size: 10px; color: #fff; background: #2f855a; border-radius: 999px; padding: 1px 6px; margin-left: 6px; vertical-align: middle; }
    .group-secret {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 18px;
      background: #6b7280;
      border-radius: 999px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .secret-lock-icon {
      width: 12px;
      height: 12px;
      display: inline-block;
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M7.2 10V7.4a4.8 4.8 0 0 1 9.6 0V10' fill='none' stroke='%23f3f6fb' stroke-width='2.2' stroke-linecap='round'/><rect x='4.8' y='10' width='14.4' height='10.6' rx='2.2' ry='2.2' fill='none' stroke='%23f3f6fb' stroke-width='2.2'/><rect x='11' y='13.7' width='2' height='3.8' rx='1' fill='%23f3f6fb'/></svg>");
    }
    .feed-lock-icon {
      width: 24px;
      height: 16px;
      display: inline-block;
      background-repeat: no-repeat;
      background-position: center;
      background-size: 10px 10px;
      vertical-align: middle;
      border-radius: 999px;
      background-color: #6b7280;
      margin-left: 4px;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M7.3 10V7.6a4.7 4.7 0 0 1 9.4 0V10' fill='none' stroke='%23ffffff' stroke-width='2.2' stroke-linecap='round'/><rect x='5' y='10' width='14' height='10' rx='2' ry='2' fill='none' stroke='%23ffffff' stroke-width='2.2'/><rect x='11.1' y='13.5' width='1.8' height='3.6' rx='0.9' fill='%23ffffff'/></svg>");
    }
    .group-actions { display: inline-flex; gap: 6px; align-items: center; flex-shrink: 0; }
    .group-actions.menu { position: relative; }
    .group-action-btn { border: 1px solid #cfd5de; background: #fff; color: #445064; border-radius: 999px; font-size: 11px; font-weight: 700; padding: 5px 9px; white-space: nowrap; flex-shrink: 0; }
    .group-action-btn.leave { color: #9a3b3b; border-color: #e4c5c5; background: #fff8f8; }
    .group-action-btn.invite { color: #365da6; border-color: #c8d8f7; background: #f5f9ff; }
    .group-action-btn.requested { color: #6b7280; border-color: #dde1e7; background: #f4f6f9; }
    .group-action-btn.more {
      min-width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      color: #566074;
      text-align: center;
      padding: 0 6px;
      font-size: 20px;
      line-height: 1;
      letter-spacing: 0;
    }
    .group-action-btn.more:hover { background: #f1f4f8; }
    .group-action-btn.more[aria-expanded="true"] { background: #eaf0f8; color: #3f4f67; border-radius: 10px; }
    .group-action-menu {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      z-index: 6;
      min-width: 156px;
      display: block;
      padding: 6px 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 8px 16px rgba(0, 0, 0, .12);
    }
    .group-menu-item {
      width: 100%;
      border: none;
      background: transparent;
      text-align: left;
      font-size: 14px;
      font-weight: 600;
      color: #334155;
      padding: 11px 14px;
      line-height: 1.2;
    }
    .group-menu-item:hover { background: #f4f7fb; }
    .group-menu-item.danger { color: #b34040; }
    .group-sort-grip { color: #8a93a1; font-size: 18px; line-height: 1; padding: 2px 4px; user-select: none; }
    .mini-badge { font-size: 10px; color: #fff; background: var(--blue); border-radius: 999px; padding: 1px 5px; }
    .mini-admin-badge { font-size: 10px; color: #fff; background: #2f855a; border-radius: 999px; padding: 1px 5px; }
    .row-actions { border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 10px; }
    .post-actions { grid-template-columns: repeat(2, 1fr); }
    .action { text-align: center; color: var(--subtle); padding: 7px 4px; border-radius: 8px; font-size: 12px; font-weight: 700; border: none; background: transparent; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
    .action-icon { width: 18px; height: 18px; object-fit: contain; flex-shrink: 0; image-rendering: -webkit-optimize-contrast; }
    .attach-icon { width: 18px; height: 18px; transform: translate(0, 1px); }
    .action:hover { background: var(--hover); }
    #composer-post-btn { background: #4f79e9; color: #fff; border-radius: 8px; }
    #composer-post-btn:hover { background: #3e68d7; }
    .post { padding: 12px; }
    .post-header { position: relative; display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; gap: 8px; }
    .post-header-main { display: flex; gap: 8px; align-items: center; min-width: 0; }
    .menu-wrap { position: relative; }
    .menu-btn { border: none; background: transparent; color: #8a8d91; font-size: 16px; line-height: 1; padding: 2px 4px; border-radius: 6px; }
    .menu-btn:hover { background: var(--hover); }
    .post-menu { position: absolute; right: 0; top: 24px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 8px 16px rgba(0,0,0,.12); min-width: 130px; display: none; z-index: 5; }
    .post-menu.open { display: block; }
    .menu-item-btn { width: 100%; border: none; background: transparent; text-align: left; font-size: 12px; color: var(--text); padding: 8px 10px; }
    .menu-item-btn:hover { background: var(--hover); }
    .menu-item-btn.with-icon { display: inline-flex; align-items: center; gap: 6px; }
    .menu-item-icon.report {
      width: 14px;
      height: 14px;
      display: inline-block;
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      flex-shrink: 0;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M4.5 6.5a3 3 0 0 1 3-3h9a3 3 0 0 1 3 3v7a3 3 0 0 1-3 3H9l-4.5 4v-14z' fill='none' stroke='%23141414' stroke-width='2.1' stroke-linejoin='round'/><path d='M12 7.8v3.9' fill='none' stroke='%23141414' stroke-width='2.1' stroke-linecap='round'/><circle cx='12' cy='14.6' r='1' fill='%23141414'/></svg>");
    }
    .post-meta b { font-size: 14px; }
    .post-meta small { font-size: 12px; color: var(--subtle); display: block; margin-top: 1px; }
    .badge { font-size: 11px; color: #fff; background: var(--blue); border-radius: 999px; padding: 2px 7px; margin-left: 4px; vertical-align: middle; }
    .post-content { font-size: 14px; line-height: 1.45; margin: 8px 0 8px; white-space: pre-wrap; }
    .shared-post-card { border: 1px solid var(--border); border-radius: 10px; background: #f7f9fc; padding: 8px; margin: 0 0 8px; }
    .shared-post-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .shared-source-avatar { width: 30px; height: 30px; border-radius: 50%; background: #cfd1d5; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; color: #3a3b3c; font-weight: 700; flex-shrink: 0; overflow: hidden; }
    .shared-post-head-meta { min-width: 0; }
    .shared-post-author { font-size: 12px; color: #47556a; font-weight: 700; line-height: 1.25; }
    .shared-post-time { font-size: 11px; color: #667484; line-height: 1.2; margin-top: 1px; }
    .shared-post-meta { font-size: 12px; color: #47556a; font-weight: 700; margin-bottom: 4px; }
    .shared-post-content { font-size: 13px; color: #4f5b6d; line-height: 1.4; white-space: pre-wrap; margin-bottom: 6px; }
    .shared-post-media { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; }
    .shared-post-media-item { min-height: 70px; border: 1px solid #d7deea; border-radius: 8px; overflow: hidden; background: #eef2f8; display: flex; align-items: center; justify-content: center; position: relative; }
    .shared-post-media-item img, .shared-post-media-item video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .shared-post-media-more { position: absolute; inset: 0; background: rgba(0,0,0,.35); color: #fff; font-size: 18px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; }
    .post-content.collapsed { white-space: normal; }
    .more-inline { border: none; background: none; color: #9aa0a6; font-size: 14px; font-weight: 400; padding: 0; margin-left: 2px; white-space: nowrap; display: inline; vertical-align: baseline; line-height: inherit; }
    .post-media { width: 100%; min-height: 190px; border-radius: 10px; border: 1px solid var(--border); background: linear-gradient(120deg, #dfe8ff, #f7f9ff); display: flex; align-items: center; justify-content: center; color: #335; font-weight: 600; font-size: 13px; }
    .post-media-grid { display: grid; gap: 4px; margin-top: 6px; }
    .post-media-grid.layout-1 { grid-template-columns: 1fr; }
    .post-media-grid.layout-2,
    .post-media-grid.layout-3,
    .post-media-grid.layout-4,
    .post-media-grid.layout-5 { grid-template-columns: repeat(2, 1fr); }
    .post-media-item { position: relative; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; min-height: 132px; background: #f3f4f7; display: flex; align-items: center; justify-content: center; }
    .post-media-grid.layout-1 .post-media-item { min-height: 250px; }
    .post-media-grid.layout-3 .post-media-item:nth-child(3) { grid-column: 1 / span 2; }
    .post-media-grid.layout-5 .post-media-item:nth-child(4) { grid-column: 2; }
    .post-media-item img, .post-media-item video { width: 100%; height: 100%; object-fit: cover; }
    .post-video-fallback { width: 100%; height: 100%; background: linear-gradient(135deg, #dfe3ea, #cfd6e2); }
    .post-media-file { font-size: 11px; color: #5f6368; text-align: center; padding: 6px; }
    .post-file-labels { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; justify-content: flex-start; }
    .post-file-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #edf1f6;
      color: #5a6677;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      border-radius: 6px;
      padding: 6px 8px;
      text-decoration: none;
      max-width: 100%;
      border: 1px solid #d8e0ea;
    }
    .post-file-label:hover { background: #e3e9f2; color: #4d5a6d; }
    .post-file-label .file-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
    .post-file-icon {
      width: 14px;
      height: 14px;
      display: inline-block;
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      flex-shrink: 0;

<body>
  <header class="topbar">
    <nav class="top-menu" aria-label="上部メニュー">
      <button class="top-menu-item active" type="button" aria-label="ホーム"><span class="top-menu-icon work" aria-hidden="true"></span></button>
      <button class="top-menu-item" type="button" aria-label="チーム"><span class="top-menu-icon team" aria-hidden="true"></span></button>
      <button class="top-menu-item notify" type="button" aria-label="通知"><span class="top-menu-icon bell" aria-hidden="true"></span><span class="top-badge" aria-label="未読通知 1件">1</span></button>
      <button class="top-menu-item" type="button" aria-label="メニュー">☰</button>
    </nav>
    <div class="search-wrap">
      <input id="timeline-search" class="search" type="text" placeholder="タイムラインを検索" />
      <button id="timeline-search-clear" class="search-clear" type="button" aria-label="検索文字をクリア">✕</button>
    </div>
  </header>

  <main class="feed">
    <section id="feed-tabs" class="feed-tabs" aria-label="フィード切替"></section>
    <section id="groups-view" class="groups-view" aria-label="グループ一覧">
      <div class="group-search-wrap">
        <input id="group-search" class="group-search" type="text" placeholder="グループ名を検索" aria-label="グループ名を検索" />
      </div>
      <div class="group-create-wrap">
        <button id="group-create-request-btn" class="group-create-btn" type="button">グループ作成申請</button>
      </div>
      <article class="card group-panel">
        <div class="group-heading-row">
          <h3 class="group-heading">参加中のグループ</h3>
          <div class="group-heading-actions">
            <button id="group-sort-cancel" class="group-sort-cancel" type="button">並び替え</button>
          </div>
        </div>
        <ul id="joined-groups" class="group-list"></ul>
      </article>
      <article class="card group-panel">
        <h3 class="group-heading">未参加のグループ</h3>
        <ul id="unjoined-groups" class="group-list"></ul>
      </article>
    </section>
    <article class="card composer">
      <div class="composer-top">
        <span id="composer-avatar" class="avatar">や</span>
        <textarea id="composer-input" class="composer-input" placeholder="投稿を作成"></textarea>
      </div>
      <div id="composer-target-row" class="composer-target-row">
        <span class="composer-target-label">投稿先</span>
        <select id="composer-target" class="composer-target-select" aria-label="投稿先を選択" required>
          <option value="" selected>グループを選択</option>
          <option value="hr">看護部（公式）</option>
          <option value="product">ナレッジ共有ラボ</option>
          <option value="sales">品質改善タスクフォース</option>
          <option value="pr">社内イベント運営</option>
        </select>
      </div>
      <div id="composer-attach-preview" class="composer-attach-preview"></div>
      <input id="composer-file-input" type="file" multiple hidden accept="image/*,video/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt" />
      <input id="composer-camera-input" type="file" hidden accept="image/*,video/*" capture="environment" />
      <div class="row-actions">
        <button id="composer-camera-btn" class="action" type="button"><img class="action-icon" alt="カメラ" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><g fill='none' stroke='%23000' stroke-width='4.5' stroke-linecap='round' stroke-linejoin='round'><path d='M10 20h10l4-7h16l4 7h10a6 6 0 0 1 6 6v24a6 6 0 0 1-6 6H10a6 6 0 0 1-6-6V26a6 6 0 0 1 6-6z'/><circle cx='32' cy='38' r='11.5'/></g></svg>" />カメラ</button>
        <button id="composer-attach-btn" class="action" type="button"><img class="action-icon attach-icon" alt="添付" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M19.4 10.6l-7.2 7.2a4.8 4.8 0 0 1-6.8-6.8l8.3-8.2a3.2 3.2 0 1 1 4.5 4.5L9.9 15.5a1.7 1.7 0 1 1-2.4-2.4l7.2-7.2' fill='none' stroke='%234b5d75' stroke-width='2.3' stroke-linecap='round' stroke-linejoin='round'/></svg>" />添付</button>
        <button id="composer-post-btn" class="action" type="button">投稿</button>
      </div>
    </article>
    <section id="posts"></section>
  </main>

  <div id="modal-backdrop" class="modal-backdrop" aria-hidden="true"></div>
  <div id="readers-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <div id="modal-title" class="modal-title">既読者一覧</div>
      <button id="modal-close" class="modal-close popup-close" aria-label="閉じる">×</button>
    </div>
    <ul id="reader-list" class="reader-list"></ul>
  </div>
  <div id="invite-backdrop" class="modal-backdrop" aria-hidden="true"></div>
  <div id="invite-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="invite-modal-title">

    </div>
  </div>
  <div id="manage-users-backdrop" class="modal-backdrop" aria-hidden="true"></div>

      <div id="manage-users-title" class="modal-title">メンバー管理</div>
      <button id="manage-users-close" class="modal-close popup-close" aria-label="閉じる">×</button>
    </div>
    <div class="manage-users-body">
      <section class="manage-users-section">
        <div class="manage-users-section-head">
          <div class="manage-users-section-title">現在のメンバー</div>
          <button id="manage-users-add-btn" class="manage-users-add-btn" type="button">メンバー追加</button>
        </div>
        <ul id="manage-users-members" class="manage-users-list"></ul>
        <div id="manage-users-members-empty" class="manage-users-empty"></div>
      </section>
      <section class="manage-users-section">
        <div class="manage-users-section-head">
          <div class="manage-users-section-title">参加申請</div>
        </div>
        <ul id="manage-users-requests" class="manage-users-list"></ul>
        <div id="manage-users-requests-empty" class="manage-users-empty"></div>
      </section>
    </div>
  </div>
  <div id="group-request-backdrop" class="modal-backdrop" aria-hidden="true"></div>
  <div id="group-request-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="group-request-title">
    <div class="modal-header">
      <div id="group-request-title" class="modal-title">グループ作成申請</div>
      <button id="group-request-close" class="modal-close popup-close" aria-label="閉じる">×</button>
    </div>
    <div class="group-request-body">
      <div class="group-request-field">
        <span class="group-request-label">アイコン</span>
        <div class="group-request-icon-row">
          <span id="group-request-icon-preview" class="group-request-icon-preview">未設定</span>
          <button id="group-request-icon-btn" class="group-request-icon-btn" type="button">画像を選択</button>
          <input id="group-request-icon-input" type="file" hidden accept="image/*" />
        </div>
      </div>
      <div class="group-request-field">
        <label class="group-request-label" for="group-request-name">グループ名</label>
        <input id="group-request-name" class="group-request-input" type="text" placeholder="グループ名を入力" />
      </div>
      <div class="group-request-field">
        <label class="group-request-label" for="group-request-description">グループの詳細説明</label>

      <button id="group-request-submit" class="app-dialog-btn ok" type="button">申請する</button>

        <div class="comment-header-meta">

        <div id="comment-header-popup" class="post-menu">

        </div>
      </div>

    function closeAppDialog(result) {
      const shouldKeepDraftUrls = !!(result && typeof result === 'object' && result.keepUrls);
      const finalResult = shouldKeepDraftUrls
        ? { text: result.text, attachments: result.attachments || [], targetFeedId: result.targetFeedId || '', targetFeedIds: result.targetFeedIds || [] }
        : result;
      if (!shouldKeepDraftUrls) {
        appDialogDraftAttachments.forEach((item) => {
          if (item.revokeOnClose) URL.revokeObjectURL(item.url);
        });
      }
      appDialogDraftAttachments = [];
      appDialogMediaEnabled = false;
      appDialogTargetEnabled = false;
      appDialogTargetMultiEnabled = false;
      appDialogTools.classList.remove('show');
      appDialogAttachPreview.classList.remove('show');
      appDialogAttachPreview.innerHTML = '';

      appDialogTargetSelect.innerHTML = '';
      appDialogTargetSelect.classList.remove('hide');
      appDialogTargetChecklist.classList.remove('show');

      appDialogSharePreview.classList.remove('show');
      appDialogSharePreview.innerHTML = '';
      appDialog.classList.remove('open');
      appDialogBackdrop.classList.remove('open');
      appDialogBackdrop.setAttribute('aria-hidden', 'true');
      if (appDialogResolver) {
        const resolve = appDialogResolver;
        appDialogResolver = null;
        resolve(finalResult);
      }
    }

    function openAppDialog({ type, title, message, defaultValue = '', okText = 'OK', cancelText = 'キャンセル', showMediaTools = false, okClass = 'ok', initialAttachments = [], showTargetSelect = false, targetLabel = '投稿先', targetOptions = [], targetValue = '', targetValues = [], targetMultiSelect = false, sharePreviewHtml = '', showInput = null }) {
      appDialogType = type;
      appDialogTitle.textContent = title;
      appDialogBody.textContent = message;
      appDialogOk.textContent = okText;
      appDialogOk.classList.remove('ok', 'cancel', 'danger');
      appDialogOk.classList.add(okClass === 'danger' ? 'danger' : (okClass === 'cancel' ? 'cancel' : 'ok'));
      appDialogCancel.textContent = cancelText;
      const withInput = showInput === null ? type === 'prompt' : !!showInput;
      const withCancel = type !== 'alert';
      appDialogMediaEnabled = withInput && showMediaTools;
      appDialogTargetEnabled = !!showTargetSelect;
      appDialogTargetMultiEnabled = appDialogTargetEnabled && !!targetMultiSelect;
      appDialogDraftAttachments.forEach((item) => {
        if (item.revokeOnClose) URL.revokeObjectURL(item.url);
      });
      appDialogDraftAttachments = [];
      appDialogTools.classList.toggle('show', appDialogMediaEnabled);
      appDialogInput.classList.toggle('show', withInput);
      appDialogCancel.classList.toggle('show', withCancel);
      appDialogTargetRow.classList.toggle('show', appDialogTargetEnabled);
      appDialogTargetLabel.textContent = targetLabel;
      appDialogInput.value = defaultValue;
      if (appDialogTargetEnabled) {
        if (appDialogTargetMultiEnabled) {
          const initialValues = new Set(
            Array.isArray(targetValues) && targetValues.length > 0
              ? targetValues
              : (targetValue ? [targetValue] : [])
          );
          appDialogTargetSelect.classList.add('hide');
          appDialogTargetChecklist.classList.add('show');
          appDialogTargetChecklist.innerHTML = (targetOptions || []).map((opt, idx) => {
            const checked = initialValues.has(opt.id) || (initialValues.size === 0 && idx === 0);
            return `<label class="app-dialog-target-checkitem"><input type="checkbox" value="${escapeHtml(opt.id)}" ${checked ? 'checked' : ''} /><span>${escapeHtml(opt.label)}</span></label>`;
          }).join('');
        } else {
          appDialogTargetSelect.classList.remove('hide');
          appDialogTargetChecklist.classList.remove('show');
          appDialogTargetChecklist.innerHTML = '';
          appDialogTargetSelect.innerHTML = (targetOptions || []).map((opt) => `<option value="${escapeHtml(opt.id)}">${escapeHtml(opt.label)}</option>`).join('');
          appDialogTargetSelect.value = targetValue || (targetOptions[0]?.id || '');
        }
      } else {
        appDialogTargetSelect.innerHTML = '';
        appDialogTargetSelect.classList.remove('hide');
        appDialogTargetChecklist.classList.remove('show');
        appDialogTargetChecklist.innerHTML = '';
      }
      appDialogSharePreview.innerHTML = sharePreviewHtml || '';
      appDialogSharePreview.classList.toggle('show', !!sharePreviewHtml);
      if (appDialogMediaEnabled && Array.isArray(initialAttachments) && initialAttachments.length > 0) {
        appDialogDraftAttachments = initialAttachments.map((item) => normalizeAttachmentForDialog(item));
        appDialogDraftAttachments.forEach((item) => scheduleVideoThumbnail(item, renderAppDialogAttachments));
      }
      renderAppDialogAttachments();
      appDialogFileInput.value = '';
      appDialogCameraInput.value = '';
      appDialog.classList.add('open');
      appDialogBackdrop.classList.add('open');
      appDialogBackdrop.setAttribute('aria-hidden', 'false');
      setTimeout(() => {
        if (withInput) {
          appDialogInput.focus();
          appDialogInput.setSelectionRange(appDialogInput.value.length, appDialogInput.value.length);
        } else {
          appDialogOk.focus();
        }
      }, 0);
      return new Promise((resolve) => {
        appDialogResolver = resolve;
      });
    }

    function showAlert(message, title = 'お知らせ') {
      return openAppDialog({ type: 'alert', title, message, okText: '閉じる', okClass: 'cancel' });

    function showConfirm(message, title = '確認', options = {}) {
      return openAppDialog({ type: 'confirm', title, message, okText: 'OK', cancelText: 'キャンセル', ...options });
    }

    function showPrompt(message, defaultValue = '', title = '入力', options = {}) {
      return openAppDialog({ type: 'prompt', title, message, defaultValue, okText: '保存', cancelText: 'キャンセル', ...options });
    }

    function selectedDialogTargetValues() {
      if (!appDialogTargetEnabled) return [];
      if (!appDialogTargetMultiEnabled) return appDialogTargetSelect.value ? [appDialogTargetSelect.value] : [];
      return Array.from(appDialogTargetChecklist.querySelectorAll('input[type="checkbox"]:checked'))
        .map((input) => input.value)
        .filter(Boolean);
    }

    async function addAppDialogFiles(fileList) {
      const files = Array.from(fileList || []);
      files.forEach((file) => {
        const url = URL.createObjectURL(file);
        const item = { file, name: file.name, type: file.type || 'application/octet-stream', url, thumbUrl: '', revokeOnClose: true };
        if (containsDuplicateAttachment(item, appDialogDraftAttachments)) {
          URL.revokeObjectURL(url);
          return;
        }
        appDialogDraftAttachments.push(item);
        scheduleVideoThumbnail(item, renderAppDialogAttachments);
      });
      renderAppDialogAttachments();
    }

    function initialsOf(name) {

    function buildAvatarDataUri(meta) {
      const source = ATTACHED_PORTRAITS[meta.photo];
      if (!source) return null;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><defs><clipPath id="c"><circle cx="32" cy="32" r="30"/></clipPath></defs><g clip-path="url(#c)"><image href="${source}" x="0" y="0" width="64" height="64" preserveAspectRatio="xMidYMid slice"/></g></svg>`;
      return `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;
    }

    const USER_AVATAR_SVG = Object.fromEntries(
      Object.entries(USER_AVATAR_META).map(([name, meta]) => [name, buildAvatarDataUri(meta)])
    );

    function photoDataUriFor(name) {
      return USER_AVATAR_SVG[name] || null;
    }

    function avatarHtmlByName(name, cls = 'avatar') {

      }

    function applyAvatarToElement(el, name) {

    function feedMetaById(feedId) {
      return FEEDS.find((feed) => feed.id === feedId) || FEEDS[0];

    function groupByFeedId(feedId) {
      if (!feedId || feedId === 'all') return null;
      const feed = FEEDS.find((item) => item.id === feedId);
      if (!feed) return null;
      return GROUP_DIRECTORY.find((group) => group.name === feed.name) || null;
    }

    function joinedFeedIds() {
      const feedByName = new Map(
        FEEDS.filter((feed) => feed.id !== 'all').map((feed) => [feed.name, feed.id])
      );
      const ids = GROUP_DIRECTORY
        .filter((group) => group.joined)
        .map((group) => feedByName.get(group.name))
        .filter(Boolean);
      return Array.from(new Set(ids));
    }

    function shareableFeeds() {
      const feedById = new Map(FEEDS.filter((feed) => feed.id !== 'all').map((feed) => [feed.id, feed]));
      return joinedFeedIds()
        .map((id) => feedById.get(id))
        .filter(Boolean);
    }

    function collectReadersForPost(post) {
      const baseReaders = Array.isArray(post.readers) ? post.readers : [];
      const commenters = Array.isArray(post.comments) ? post.comments.map((c) => c.user).filter(Boolean) : [];
      return Array.from(new Set([...baseReaders, ...commenters]));

    function attachmentName(item) {
      if (!item) return 'file';
      return item.file?.name || item.name || 'file';
    }

    function attachmentType(item) {
      if (!item) return 'application/octet-stream';
      return item.file?.type || item.type || 'application/octet-stream';
    }

    function hasFileMeta(item) {
      return !!(item && item.file && Number.isFinite(item.file.size) && Number.isFinite(item.file.lastModified));
    }

    function isSameAttachment(a, b) {
      const aName = attachmentName(a).trim().toLowerCase();
      const bName = attachmentName(b).trim().toLowerCase();
      if (aName !== bName) return false;
      const aType = attachmentType(a).trim().toLowerCase();
      const bType = attachmentType(b).trim().toLowerCase();
      if (aType !== bType) return false;
      const aHasMeta = hasFileMeta(a);
      const bHasMeta = hasFileMeta(b);
      if (aHasMeta && bHasMeta) {
        return a.file.size === b.file.size && a.file.lastModified === b.file.lastModified;
      }
      return true;
    }

    function containsDuplicateAttachment(candidate, list) {
      return (list || []).some((item) => isSameAttachment(candidate, item));
    }

    function attachmentKind(item) {
      const type = attachmentType(item).toLowerCase();
      const name = attachmentName(item).toLowerCase();
      const ext = name.includes('.') ? name.split('.').pop() : '';
      if (type.includes('pdf') || ext === 'pdf') return 'pdf';
      if (type.includes('msword') || type.includes('wordprocessingml') || ext === 'doc' || ext === 'docx') return 'word';
      if (type.includes('presentation') || ext === 'ppt' || ext === 'pptx') return 'ppt';
      if (type.includes('spreadsheet') || type.includes('excel') || ext === 'xls' || ext === 'xlsx' || ext === 'csv') return 'excel';
      if (type.includes('zip') || type.includes('compressed') || ['zip', 'rar', '7z', 'tar', 'gz'].includes(ext)) return 'zip';
      if (type.startsWith('text/') || ['txt', 'md', 'log', 'rtf'].includes(ext)) return 'txt';
      return 'default';
    }

    function createVideoThumbnailDataUrl(videoUrl) {
      return new Promise((resolve) => {
        const video = document.createElement('video');
        let finished = false;
        let timeoutId = null;
        const finish = (value) => {
          if (finished) return;
          finished = true;
          if (timeoutId) clearTimeout(timeoutId);
          video.removeAttribute('src');
          video.load();
          resolve(value);
        };
        const capture = () => {
          try {
            const width = video.videoWidth;
            const height = video.videoHeight;
            if (!width || !height) {
              finish(null);
              return;
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            if (!ctx) {
              finish(null);
              return;
            }
            ctx.drawImage(video, 0, 0, width, height);
            finish(canvas.toDataURL('image/jpeg', 0.82));
          } catch {
            finish(null);
          }
        };
        video.preload = 'metadata';
        video.muted = true;
        video.playsInline = true;
        video.addEventListener('error', () => finish(null), { once: true });
        video.addEventListener('loadeddata', () => {
          if (video.duration && video.duration > 0.1) {
            try {
              video.currentTime = 0.1;
            } catch {
              capture();
            }
          } else {
            capture();
          }
        }, { once: true });
        video.addEventListener('seeked', capture, { once: true });
        timeoutId = setTimeout(() => finish(null), 4500);
        video.src = videoUrl;
      });
    }

    function scheduleVideoThumbnail(item, refresh) {
      if (!item || !attachmentType(item).startsWith('video/') || item.thumbUrl) return;
      createVideoThumbnailDataUrl(item.url).then((thumbUrl) => {
        if (!thumbUrl) return;
        item.thumbUrl = thumbUrl;
        refresh();
      });
    }

    function normalizeAttachmentForPost(item) {
      return {
        name: attachmentName(item),
        type: attachmentType(item),
        url: item.url,
        thumbUrl: item.thumbUrl || '',
      };
    }

    function normalizeAttachmentForDialog(item) {
      return {
        name: attachmentName(item),
        type: attachmentType(item),
        url: item.url,
        thumbUrl: item.thumbUrl || '',
        file: item.file || null,
        revokeOnClose: !!item.file,
      };
    }

    function renderAppDialogAttachments() {
      const hasItems = appDialogMediaEnabled && appDialogDraftAttachments.length > 0;
      appDialogAttachPreview.classList.toggle('show', hasItems);
      if (!hasItems) {
        appDialogAttachPreview.innerHTML = '';
        return;
      }
      appDialogAttachPreview.innerHTML = appDialogDraftAttachments.map((item, idx) => {
        const type = attachmentType(item);
        const name = attachmentName(item);
        let body = `<div class="app-dialog-attach-file">${escapeHtml(name)}</div>`;
        if (type.startsWith('image/')) {
          body = `<img src="${item.url}" alt="${escapeHtml(name)}" />`;
        } else if (type.startsWith('video/')) {
          body = item.thumbUrl
            ? `<img src="${item.thumbUrl}" alt="${escapeHtml(name)}" />`
            : `<video src="${item.url}" muted playsinline preload="metadata"></video>`;
        }
        return `<div class="app-dialog-attach-chip">${body}<button class="app-dialog-attach-remove" type="button" data-dialog-attach-remove="${idx}" aria-label="添付を削除">✕</button></div>`;
      }).join('');
    }

    function openMediaPreview(visualItems, startIndex) {
      if (!Array.isArray(visualItems) || visualItems.length === 0) return;
      mediaPreviewItems = visualItems;
      mediaPreviewIndex = Math.max(0, Math.min(startIndex, visualItems.length - 1));
      renderMediaPreview();
      mediaPreview.classList.add('open');
      mediaPreview.setAttribute('aria-hidden', 'false');
    }

    function closeMediaPreview() {
      mediaPreview.classList.remove('open');
      mediaPreview.setAttribute('aria-hidden', 'true');
      mediaPreviewItems = [];
      mediaPreviewIndex = 0;
      mediaPreviewBody.innerHTML = '';
    }

    function moveMediaPreview(step) {
      if (mediaPreviewItems.length === 0) return;
      const length = mediaPreviewItems.length;
      mediaPreviewIndex = (mediaPreviewIndex + step + length) % length;
      renderMediaPreview();
    }

    function renderMediaPreview() {
      const item = mediaPreviewItems[mediaPreviewIndex];
      if (!item) return;
      if (item.type.startsWith('video/')) {
        mediaPreviewBody.innerHTML = `<video src="${item.url}" ${item.thumbUrl ? `poster="${item.thumbUrl}"` : ''} controls autoplay playsinline></video>`;
        const videoEl = mediaPreviewBody.querySelector('video');
        if (videoEl) {
          videoEl.addEventListener('error', () => {
            if (item.thumbUrl) {
              mediaPreviewBody.innerHTML = `<img src="${item.thumbUrl}" alt="${escapeHtml(item.name || '')}" />`;
            } else {
              mediaPreviewBody.innerHTML = '<div class="app-dialog-body" style="margin:0;color:#d6dbe4;">動画を読み込めません</div>';
            }
          }, { once: true });
        }
      } else {
        mediaPreviewBody.innerHTML = `<img src="${item.url}" alt="${escapeHtml(item.name || '')}" />`;
      }
      const showNav = mediaPreviewItems.length > 1;
      mediaPreviewPrev.style.display = showNav ? 'inline-flex' : 'none';
      mediaPreviewNext.style.display = showNav ? 'inline-flex' : 'none';
    }

    function renderPostMedia(post) {
      if (post.attachments && post.attachments.length > 0) {
        const safeAttachments = post.attachments.filter(Boolean);
        const visualItems = safeAttachments.filter((item) => attachmentType(item).startsWith('image/') || attachmentType(item).startsWith('video/'));
        const fileItems = safeAttachments.filter((item) => !attachmentType(item).startsWith('image/') && !attachmentType(item).startsWith('video/'));
        const buildFileLabels = () => fileItems.length > 0
          ? `<div class="post-file-labels">${fileItems.map((item) => `<a class="post-file-label" href="${item.url}" download="${escapeHtml(attachmentName(item))}"><span class="post-file-icon kind-${attachmentKind(item)}" aria-hidden="true"></span><span class="file-name">${escapeHtml(attachmentName(item))}</span></a>`).join('')}</div>`
          : '';
        if (visualItems.length > 0) {
          const count = visualItems.length;
          const layout = count <= 1 ? 'layout-1'
            : count === 2 ? 'layout-2'
            : count === 3 ? 'layout-3'
            : count === 4 ? 'layout-4'
            : 'layout-5';
          const overflowCount = count > 4 ? count - 4 : 0;
          const renderItems = count > 4 ? visualItems.slice(0, 4) : visualItems;
          const items = renderItems.map((item, idx) => {
            const media = attachmentType(item).startsWith('video/')
              ? (item.thumbUrl
                ? `<img src="${item.thumbUrl}" alt="${escapeHtml(attachmentName(item))}" />`
                : `<video src="${item.url}" muted playsinline preload="metadata"></video>`)
              : `<img src="${item.url}" alt="${escapeHtml(attachmentName(item))}" />`;
            const playBadge = attachmentType(item).startsWith('video/') ? '<span class="post-media-play">▶</span>' : '';
            const more = overflowCount > 0 && idx === 3 ? `<span class="post-media-more">+${overflowCount}</span>` : '';
            return `<div class="post-media-item" data-preview-post-id="${post.id}" data-preview-index="${idx}">${media}${playBadge}${more}</div>`;
          }).join('');
          return `<div class="post-media-grid ${layout}">${items}</div>${buildFileLabels()}`;
        }
        return buildFileLabels();
      }
      return post.media ? `<div class="post-media">${escapeHtml(post.media)}</div>` : '';
    }

    function renderSharedPostBlock(post) {
      const source = post && post.sharedFrom;
      if (!source) return '';
      const sourceFeed = feedMetaById(source.feedId);
      const allAttachments = source.attachments || [];
      const visualItems = allAttachments.filter((item) => attachmentType(item).startsWith('image/') || attachmentType(item).startsWith('video/'));
      const fileItems = allAttachments.filter((item) => !attachmentType(item).startsWith('image/') && !attachmentType(item).startsWith('video/'));
      const previewItems = visualItems.slice(0, 2);
      const mediaHtml = previewItems.length > 0
        ? `<div class="shared-post-media">${previewItems.map((item, idx) => {
            const media = attachmentType(item).startsWith('video/')
              ? (item.thumbUrl
                ? `<img src="${item.thumbUrl}" alt="${escapeHtml(attachmentName(item))}" />`
                : `<video src="${item.url}" muted playsinline preload="metadata"></video>`)
              : `<img src="${item.url}" alt="${escapeHtml(attachmentName(item))}" />`;
            const remain = visualItems.length - 2;
            const more = (idx === 1 && remain > 0) ? `<span class="shared-post-media-more">+${remain}</span>` : '';
            return `<div class="shared-post-media-item" data-shared-preview-post-id="${post.id}" data-shared-preview-index="${idx}">${media}${more}</div>`;
          }).join('')}</div>`
        : '';
      const fileLabels = fileItems.length > 0
        ? `<div class="post-file-labels">${fileItems.map((item) => `<a class="post-file-label" href="${item.url}" download="${escapeHtml(attachmentName(item))}"><span class="post-file-icon kind-${attachmentKind(item)}" aria-hidden="true"></span><span class="file-name">${escapeHtml(attachmentName(item))}</span></a>`).join('')}</div>`
        : '';
      return `<div class="shared-post-card">
        <div class="shared-post-head">
          ${avatarHtmlByName(source.author?.user || '', 'shared-source-avatar')}
          <div class="shared-post-head-meta">
            <div class="shared-post-author">${escapeHtml(source.author?.user || '')}</div>
            <div class="shared-post-time">${source.hoursAgo !== undefined ? escapeHtml(formatTimestamp(source.hoursAgo)) : ''}</div>

        <div class="shared-post-content">${escapeHtml(source.content || '')}</div>
        ${mediaHtml}
        ${fileLabels}
      </div>`;
    }

    function buildSharePreviewHtml(sourcePost) {
      if (!sourcePost) return '';
      const sourceFeed = feedMetaById(sourcePost.feedId);

    }

    async function showShareDialog(sourcePost) {
      const targets = shareTargetOptions();
      if (targets.length === 0) {
        await showAlert('シェアできる投稿先グループがありません');
        return null;
      }
      const defaultTarget = targets.some((item) => item.id === sourcePost.feedId)
        ? sourcePost.feedId
        : targets[0].id;
      const previewHtml = buildSharePreviewHtml(sourcePost);
      return openAppDialog({
        type: 'prompt',
        title: '投稿をシェア',
        message: '',
        defaultValue: '',
        okText: '今すぐシェア',
        cancelText: 'キャンセル',
        showMediaTools: true,
        showTargetSelect: targets.length >= 2,
        targetOptions: targets,
        targetValue: defaultTarget,

          initialAttachments: post.attachments || [],

    function renderFeedTabs() {

      const allFeed = FEEDS.find((feed) => feed.id === 'all') || FEEDS[0];
      const visibleFeeds = [allFeed, ...orderedJoinedFeeds];
      if (!visibleFeeds.some((feed) => feed.id === currentFeedId)) {
        currentFeedId = 'all';

      feedTabs.innerHTML = visibleFeeds.map((feed) => `

          ${escapeHtml(feed.name)}${feed.official ? ' <span class="mini-badge">公式</span>' : ''}${(() => {

          })()}${feed.secret ? ' <span class="feed-lock-icon" aria-label="秘密グループ"></span>' : ''}

    function groupIconHtml(group, initials) {
      if (group && (group.id === 'grp-hr' || group.name === '看護部')) {
        return `<img src="${NURSING_GROUP_ICON}" alt="看護部アイコン" />`;
      }
      return escapeHtml(initials);
    }

    function groupItemHtml(group) {
      const initials = (group.name || '').slice(0, 2);
      const iconHtml = groupIconHtml(group, initials);
      const canManageUsers = !!group.joined && !group.official && isCurrentUserGroupAdmin(group);
      const canInviteUsers = !!group.joined && !group.official && !canManageUsers;
      const canShowJoinedMenu = !!group.joined && !group.official;
      const isGroupMenuOpen = activeGroupMenuId === group.id;
      let actionHtml = '';
      if (group.joined && isGroupSortMode) {
        actionHtml = `<div class="group-actions"><span class="group-sort-grip" aria-hidden="true">≡</span></div>`;
      } else if (canShowJoinedMenu) {
        const menuItems = [
          canManageUsers ? `<button class="group-menu-item" type="button" data-group-id="${escapeHtml(group.id || '')}" data-group-manage-users="true">メンバー管理</button>` : '',
          canInviteUsers ? `<button class="group-menu-item" type="button" data-group-id="${escapeHtml(group.id || '')}" data-group-invite="true">招待申請</button>` : '',
          `<button class="group-menu-item danger" type="button" data-group-id="${escapeHtml(group.id || '')}" data-group-action="leave">退出</button>`,
        ].filter(Boolean).join('');
        actionHtml = `<div class="group-actions menu">
          <button class="group-action-btn more" type="button" data-group-id="${escapeHtml(group.id || '')}" data-group-menu-toggle="true" aria-expanded="${isGroupMenuOpen ? 'true' : 'false'}" aria-label="グループメニュー">•••</button>
          ${isGroupMenuOpen ? `<div class="group-action-menu" role="menu">${menuItems}</div>` : ''}
        </div>`;
      } else if (!group.official && !group.joined) {
        const requested = !!group.requested;
        actionHtml = `<div class="group-actions"><button class="group-action-btn ${requested ? 'requested' : ''}" type="button" data-group-id="${escapeHtml(group.id || '')}" data-group-action="${requested ? '' : 'join'}" ${requested ? 'disabled' : ''}>${requested ? '申請済み' : '参加申請'}</button></div>`;
      }
      return `<li class="group-item ${group.joined && isGroupSortMode ? 'sortable' : ''} ${isGroupMenuOpen ? 'menu-open' : ''}" data-group-id="${escapeHtml(group.id || '')}">
        <div class="group-item-main">
          <span class="group-icon">${iconHtml}</span>
          <div class="group-meta">
            <span class="group-name">${escapeHtml(group.name)}</span>
            ${group.official ? '<span class="group-official">公式</span>' : ''}
            ${canManageUsers ? '<span class="group-admin">管理者</span>' : ''}
            ${group.secret ? '<span class="group-secret"><span class="secret-lock-icon" aria-label="秘密グループ"></span></span>' : ''}
            <span class="group-count">(${group.members})</span>
          </div>
        </div>
        ${actionHtml}
      </li>`;
    }

    function renderGroupsView() {
      syncJoinedGroupMemberCounts();
      const q = currentGroupSearchQuery.trim().toLowerCase();
      const match = (item) => !q || item.name.toLowerCase().includes(q);
      const joinedTotalCount = GROUP_DIRECTORY.filter((item) => item.joined).length;
      const canSortJoinedGroups = joinedTotalCount >= 2;
      if (!canSortJoinedGroups && isGroupSortMode) isGroupSortMode = false;
      const joined = GROUP_DIRECTORY.filter((item) => item.joined && match(item));
      const unjoined = GROUP_DIRECTORY.filter((item) => !item.joined && !item.secret && match(item));
      const visibleGroupIds = new Set([...joined, ...unjoined].map((item) => item.id));
      if (activeGroupMenuId && !visibleGroupIds.has(activeGroupMenuId)) activeGroupMenuId = '';
      groupSortCancel.classList.toggle('show', canSortJoinedGroups);
      groupSortCancel.classList.toggle('active', isGroupSortMode);
      groupSortCancel.textContent = isGroupSortMode ? '並び替えを終了' : '並び替え';
      joinedGroups.innerHTML = joined.length > 0
        ? joined.map(groupItemHtml).join('')
        : '<li class="group-empty">該当するグループがありません</li>';
      unjoinedGroups.innerHTML = unjoined.length > 0
        ? unjoined.map(groupItemHtml).join('')
        : '<li class="group-empty">該当するグループがありません</li>';
    }

    function renderComposerAttachments() {
      composerAttachPreview.innerHTML = composerAttachments.map((item) => {
        let body = `<div class="attach-fallback">${escapeHtml(item.file.name)}</div>`;
        if (item.file.type.startsWith('image/')) {
          body = `<img src="${item.url}" alt="${escapeHtml(item.file.name)}" />`;
        } else if (item.file.type.startsWith('video/')) {
          body = item.thumbUrl
            ? `<img src="${item.thumbUrl}" alt="${escapeHtml(item.file.name)}" />`
            : `<video src="${item.url}" muted playsinline preload="metadata"></video>`;
        }
        return `<div class="attach-chip">${body}<button class="attach-remove" type="button" data-attach-id="${item.id}" aria-label="添付を削除">✕</button></div>`;
      }).join('');
    }

    async function addComposerFiles(fileList) {
      const items = Array.from(fileList || []);
      items.forEach((file) => {
        const id = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
        const url = URL.createObjectURL(file);
        const item = { id, file, url, thumbUrl: '' };
        if (containsDuplicateAttachment(item, composerAttachments)) {
          URL.revokeObjectURL(url);
          return;
        }
        composerAttachments.push(item);
        scheduleVideoThumbnail(item, renderComposerAttachments);
      });
      renderComposerAttachments();
    }

    function makePostCard(post) {
      const card = document.createElement('article');
      card.className = 'card post';
      card.dataset.postId = String(post.id);
      const isOwnPost = post.author && post.author.user === CURRENT_USER;
      const isAdminPost = isCurrentUserPostAdmin(post);
      const visibleReaders = collectReadersForPost(post);
      const postFeed = feedMetaById(post.feedId);
      const shareCount = computedShareCount(post);
      card.innerHTML = `
        <div class="post-header">
          <div class="post-header-main">
            ${avatarHtmlByName(post.author.user, "avatar")}
            <div class="post-meta">

    function applyMoreToggle(card) {
      const contentEl = card.querySelector('.post-content');
      if (!contentEl) return;
      const fullText = contentEl.dataset.full || '';
      contentEl.textContent = fullText;
      const lineHeight = parseFloat(getComputedStyle(contentEl).lineHeight) || 20;
      const maxHeight = lineHeight * 3;
      if (contentEl.scrollHeight <= maxHeight + 1) {
        contentEl.classList.remove('collapsed');
        return;
      }

      const normalized = fullText.replaceAll('\n', ' ');
      const renderCollapsedPreview = (length) => {
        contentEl.textContent = `${normalized.slice(0, length).trimEnd()}... `;
        const probeBtn = document.createElement('button');
        probeBtn.className = 'more-inline';
        probeBtn.type = 'button';
        probeBtn.textContent = 'もっと見る';
        contentEl.appendChild(probeBtn);
      };
      let low = 0;
      let high = normalized.length;
      let best = 0;
      while (low <= high) {
        const mid = Math.floor((low + high) / 2);
        renderCollapsedPreview(mid);
        if (contentEl.scrollHeight <= maxHeight + 1) {
          best = mid;
          low = mid + 1;
        } else {
          high = mid - 1;
        }
      }

      contentEl.classList.add('collapsed');
      renderCollapsedPreview(best);
    }

    function escapeHtml(text) {
      return text

        .replaceAll("'", '&#39;');
    }



    function formatDateTimeJa(date) {
      const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
      const y = date.getFullYear();
      const m = date.getMonth() + 1;
      const d = date.getDate();
      const w = weekdays[date.getDay()];
      const hh = String(date.getHours()).padStart(2, '0');
      const mm = String(date.getMinutes()).padStart(2, '0');
      return `${y}年${m}月${d}日（${w}）${hh}:${mm}`;
    }

    function formatTimestamp(hoursAgo) {
      if (hoursAgo < 24) return `${hoursAgo}時間前`;
      const now = new Date();
      const target = new Date(now.getTime() - hoursAgo * 60 * 60 * 1000);
      return formatDateTimeJa(target);
    }

    function formatPostMetaLine(post) {
      return `${post.author.user} ・ ${formatTimestamp(post.hoursAgo)}${post.edited ? ' ・ 編集済み' : ''}`;
    }

    function formatRelativeCommentTimestamp(createdAt) {
      const nowMs = Date.now();
      const diffSec = Math.max(0, Math.floor((nowMs - createdAt) / 1000));
      if (diffSec < 60) {
        const sec = Math.max(1, diffSec);
        return `${sec}秒前`;
      }
      const diffMin = Math.floor(diffSec / 60);
      if (diffMin < 60) return `${diffMin}分前`;
      const diffHour = Math.floor(diffMin / 60);
      if (diffHour < 24) return `${diffHour}時間前`;
      return formatDateTimeJa(new Date(createdAt));
    }

    function uniqueNames(names) {
      return Array.from(new Set((Array.isArray(names) ? names : []).filter(Boolean)));

    function ensureGroupManageData(group) {
      if (!group) return;
      group.membersList = uniqueNames(group.membersList);
      if (!group.membersList.includes(CURRENT_USER) && group.joined) {
        group.membersList.unshift(CURRENT_USER);
      }
      const seededAdmins = [...(Array.isArray(group.adminUsers) ? group.adminUsers : [])];
      if (group.admin) seededAdmins.push(CURRENT_USER);
      group.adminUsers = uniqueNames(seededAdmins).filter((name) => group.membersList.includes(name));
      group.joinRequests = uniqueNames([...(group.joinRequests || []), ...(group.pendingInvites || [])])
        .filter((name) => !group.membersList.includes(name));
      group.pendingInvites = group.joinRequests.slice();
      group.admin = group.adminUsers.includes(CURRENT_USER);
    }

    function inferInitialMembersForGroup(group) {
      if (!group) return [CURRENT_USER];
      const feed = FEEDS.find((item) => item.name === group.name);
      const authorUsers = feed && AUTHORS_BY_FEED[feed.id]
        ? AUTHORS_BY_FEED[feed.id].map((author) => author.user).filter(Boolean)
        : [];
      const inferred = uniqueNames([CURRENT_USER, ...authorUsers]);
      return inferred.length > 0 ? inferred : [CURRENT_USER];
    }

    function syncJoinedGroupMemberCounts() {
      GROUP_DIRECTORY.forEach((group) => {
        if (!group.joined || group.official) return;
        const isAdminGroup = isCurrentUserGroupAdmin(group);
        if (isAdminGroup) {
          if (!Array.isArray(group.membersList) || group.membersList.length === 0) {
            group.membersList = inferInitialMembersForGroup(group);
          }
          ensureGroupManageData(group);
          group.members = group.membersList.length;
          return;
        }
        const feed = FEEDS.find((item) => item.name === group.name);
        if (!feed) {
          group.members = 0;
          return;
        }
        const writers = new Set(
          posts
            .filter((post) => post.feedId === feed.id)
            .map((post) => post.author?.user)
            .filter(Boolean)
        );
        writers.add(CURRENT_USER);
        group.members = writers.size;
      });
    }

    function ensureCommentIds(post) {
      if (!post || !Array.isArray(post.comments)) return;
      let nextId = 1;
      post.comments.forEach((c) => {
        if (Number.isFinite(c.commentId) && c.commentId >= nextId) nextId = c.commentId + 1;
      });
      post.comments.forEach((c) => {
        if (!Number.isFinite(c.commentId)) {
          c.commentId = nextId;

        }
      });
    }

      } catch {
        const tmp = document.createElement('textarea');

        tmp.select();
        document.execCommand('copy');
        tmp.remove();
      }
    }

    function scrollToPost(postId) {
      if (!postId) return;
      const scrollNow = (behavior = 'smooth') => {
        const target = postsRoot.querySelector(`article.post[data-post-id="${String(postId)}"]`);
        if (!target) return;
        const topbarHeight = topbar ? Math.ceil(topbar.getBoundingClientRect().height) : 0;
        const y = Math.max(0, window.scrollY + target.getBoundingClientRect().top - topbarHeight - 8);
        window.scrollTo({ top: y, behavior });
      };
      requestAnimationFrame(() => {
        scrollNow('smooth');
        setTimeout(() => scrollNow('auto'), 280);
      });
    }

    function navigateToTimelinePost(feedId, postId) {
      activateTimelineView();
      currentFeedId = feedId || 'all';
      rerenderTimeline();
      const maxAttempts = 4;
      let attempts = 0;
      const tryScroll = () => {
        scrollToPost(postId);
        attempts += 1;
        if (attempts >= maxAttempts) return;
        setTimeout(() => {
          const target = postsRoot.querySelector(`article.post[data-post-id="${String(postId)}"]`);
          if (!target) return;
          const rect = target.getBoundingClientRect();
          const isVisible = rect.top >= 0 && rect.bottom <= window.innerHeight;
          if (!isVisible) tryScroll();
        }, 220);
      };
      requestAnimationFrame(tryScroll);
    }

      if (isLoadingMore) return;
      isLoadingMore = true;
      const start = loadedPostCount;
      const end = start + PAGE_SIZE;
      for (let i = start; i < end; i += 1) {
        const post = createMockPost(i);
        posts.push(post);
      }
      loadedPostCount = end;
      isLoadingMore = false;

    async function handlePostAreaClick(event) {
      const sharedPreviewItem = event.target.closest('.shared-post-media-item[data-shared-preview-post-id][data-shared-preview-index]');
      if (sharedPreviewItem) {
        const containerPost = posts.find((p) => String(p.id) === sharedPreviewItem.dataset.sharedPreviewPostId);
        const source = containerPost && containerPost.sharedFrom;
        if (source && Array.isArray(source.attachments)) {
          const visualItems = source.attachments.filter((item) => item.type.startsWith('image/') || item.type.startsWith('video/'));
          const idx = Number(sharedPreviewItem.dataset.sharedPreviewIndex);
          if (visualItems.length > 0 && Number.isFinite(idx)) {
            openMediaPreview(visualItems, idx);
            return;
          }
        }
      }
      const previewItem = event.target.closest('.post-media-item[data-preview-post-id][data-preview-index]');
      if (previewItem) {
        const targetPost = posts.find((p) => String(p.id) === previewItem.dataset.previewPostId);
        if (targetPost && Array.isArray(targetPost.attachments)) {
          const visualItems = targetPost.attachments.filter((item) => item.type.startsWith('image/') || item.type.startsWith('video/'));
          const idx = Number(previewItem.dataset.previewIndex);
          if (visualItems.length > 0 && Number.isFinite(idx)) {
            openMediaPreview(visualItems, idx);
            return;
          }
        }
      }

      const moreBtn = event.target.closest('.more-inline');
      if (moreBtn) {
        const contentEl = moreBtn.closest('.post-content');
        if (!contentEl) return;
        contentEl.textContent = contentEl.dataset.full;
        contentEl.classList.remove('collapsed');
        return;
      }

      const menuBtn = event.target.closest('.menu-btn');
      if (menuBtn) {
        const menuId = menuBtn.dataset.menuId;
        document.querySelectorAll('.post-menu').forEach((el) => {
          if (el.dataset.menu === menuId) {
            el.classList.toggle('open');
          } else {
            el.classList.remove('open');
          }
        });
        return;
      }

      const reportAction = event.target.closest('.report-action');
      if (reportAction) {
        await showAlert(`投稿 #${reportAction.dataset.reportId} をグループ管理者に報告しました`);
        document.querySelectorAll('.post-menu').forEach((el) => el.classList.remove('open'));
        return;
      }

      const editPostAction = event.target.closest('.edit-post-action');
      if (editPostAction) {
        const targetPost = posts.find((p) => String(p.id) === editPostAction.dataset.editPostId);
        if (targetPost && targetPost.author && targetPost.author.user === CURRENT_USER) {
          const next = await showEditDialogForPost(targetPost);
          if (next !== null) {
            const nextText = typeof next === 'string' ? next : (next.text || '');
            const newAttachments = (next && typeof next === 'object' && Array.isArray(next.attachments)) ? next.attachments : [];
            const trimmed = nextText.trim();
            if (trimmed || newAttachments.length > 0 || targetPost.sharedFrom) {
              targetPost.content = trimmed;
              targetPost.attachments = newAttachments.map((item) => normalizeAttachmentForPost(item));
              targetPost.edited = true;
              rerenderTimeline();
              scrollToPost(targetPost.id);
              if (commentView.classList.contains('open') && currentCommentPostId === targetPost.id) {
                renderCommentView(targetPost);
              }
            }
          }
        }
        document.querySelectorAll('.post-menu').forEach((el) => el.classList.remove('open'));
        return;
      }

      const deletePostAction = event.target.closest('.delete-post-action');
      if (deletePostAction) {
        const index = posts.findIndex((p) => String(p.id) === deletePostAction.dataset.deletePostId);
        const targetPost = index >= 0 ? posts[index] : null;
        if (targetPost && (targetPost.author?.user === CURRENT_USER || isCurrentUserPostAdmin(targetPost))) {
          if (await showConfirm('この投稿を削除しますか？', '投稿を削除', { okText: '削除', okClass: 'danger' })) {
            posts.splice(index, 1);
            if (commentView.classList.contains('open') && currentCommentPostId === targetPost.id) {
              closeCommentView();
            }
            rerenderTimeline();
          }
        }
        document.querySelectorAll('.post-menu').forEach((el) => el.classList.remove('open'));
        return;
      }

      const commentBtn = event.target.closest('.comment-action, .comment-count-link');
      if (commentBtn) {
        const post = posts.find((p) => String(p.id) === commentBtn.dataset.postId);
        if (post) renderCommentView(post);
        return;
      }

      const shareBtn = event.target.closest('.share-action, .share-count-link');
      if (shareBtn) {
        const sourcePost = posts.find((p) => String(p.id) === shareBtn.dataset.postId);
        if (!sourcePost) return;
        const sourceSnapshot = {
          id: sourcePost.id,
          feedId: sourcePost.feedId,
          hoursAgo: sourcePost.hoursAgo,
          author: sourcePost.author ? { ...sourcePost.author } : null,
          content: sourcePost.content || '',
          attachments: (sourcePost.attachments || []).map((item) => normalizeAttachmentForPost(item)),
        };
        const next = await showShareDialog(sourceSnapshot);
        if (next === null) return;
        const nextText = typeof next === 'string' ? next : (next.text || '');
        const newAttachments = (next && typeof next === 'object' && Array.isArray(next.attachments)) ? next.attachments : [];
        const availableTargets = shareableFeeds();
        const implicitShareTargetId = availableTargets.length === 1 ? availableTargets[0].id : '';
        const targetFeedId = (next && typeof next === 'object' && next.targetFeedId) ? next.targetFeedId : (implicitShareTargetId || sourceSnapshot.feedId);
        const validTargets = new Set(availableTargets.map((feed) => feed.id));
        if (!validTargets.has(targetFeedId)) {
          await showAlert('投稿先グループを選択してください');
          return;
        }
        const selectedFeed = feedMetaById(targetFeedId);
        const newId = posts.length ? Math.max(...posts.map((post) => post.id)) + 1 : 1;
        const author = authors.find((item) => item.user === CURRENT_USER) || authors[0];
        const attachmentPayload = newAttachments.map((item) => normalizeAttachmentForPost(item));
        const sharedFrom = sourceSnapshot;
        posts.unshift({
          id: newId,
          author,
          feedId: selectedFeed.id,
          hoursAgo: 0,
          content: (nextText || '').trim(),
          media: '',
          attachments: attachmentPayload,
          sharedFrom,
          readers: [],
          commentCount: 0,
          shareCount: 0,
          comments: [],
        });
        navigateToTimelinePost(selectedFeed.id, newId);
        if (commentView.classList.contains('open') && currentCommentPostId === sourcePost.id) {
          renderCommentView(sourcePost);
        }
        return;
      }

      const readBtn = event.target.closest('.read-count-btn');
      if (!readBtn) return;
      const readers = JSON.parse(readBtn.dataset.readers);
      openReadersModal(readers);
    }

        const name = toggleAdminBtn.dataset.manageToggleAdminUser;
        const setAdmin = toggleAdminBtn.dataset.manageSetAdmin === '1';
        if (!name) return;
        ensureGroupManageData(manageUsersModalGroup);
        if (setAdmin) {
          if (!manageUsersModalGroup.adminUsers.includes(name)) {
            manageUsersModalGroup.adminUsers.push(name);
          }
        } else {
          const nextAdmins = manageUsersModalGroup.adminUsers.filter((item) => item !== name);
          if (nextAdmins.length === 0) {

        rerenderTimeline();

      const removeBtn = event.target.closest('[data-manage-remove-user]');

      const name = removeBtn.dataset.manageRemoveUser;
      if (!name) return;
      ensureGroupManageData(manageUsersModalGroup);
      const isRemovingAdmin = manageUsersModalGroup.adminUsers.includes(name);

        await showAlert('管理者がいなくなるため退出できません。先に他のメンバーを管理者にしてください');
        return;
      }
      const isSelfRemove = name === CURRENT_USER;
      const confirmMessage = isSelfRemove
        ? `「${manageUsersModalGroup.name}」から退出しますか？`
        : `「${name}」をグループから退出させますか？`;
      const confirmTitle = isSelfRemove ? 'グループから退出' : 'メンバーを退出';
      const confirmOkText = isSelfRemove ? '退出する' : '退出させる';
      if (!await showConfirm(confirmMessage, confirmTitle, { okText: confirmOkText, cancelText: 'キャンセル', okClass: 'danger' })) return;
      const prevLength = manageUsersModalGroup.membersList.length;
      manageUsersModalGroup.membersList = manageUsersModalGroup.membersList.filter((item) => item !== name);
      manageUsersModalGroup.adminUsers = manageUsersModalGroup.adminUsers.filter((item) => item !== name);

        renderComposerTargetOptions();
        rerenderTimeline();
