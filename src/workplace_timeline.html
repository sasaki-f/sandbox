          if (!await showConfirm(`「${target.name}」に参加申請しますか？`, 'グループに参加申請', { okText: '参加申請する', cancelText: 'キャンセル' })) {
            event.preventDefault();
            return;
          }
          target.requested = true;
        }
        renderGroupsView();
        renderComposerTargetOptions();
        rerenderTimeline();
        event.preventDefault();
      }
    });

    function moveJoinedGroup(sourceId, targetId, placeAfter) {
      if (!sourceId || !targetId || sourceId === targetId) return;
      const joined = GROUP_DIRECTORY.filter((item) => item.joined);
      const unjoined = GROUP_DIRECTORY.filter((item) => !item.joined);
      const sourceIndex = joined.findIndex((item) => item.id === sourceId);
      const targetIndex = joined.findIndex((item) => item.id === targetId);
      if (sourceIndex < 0 || targetIndex < 0) return;
      const [moved] = joined.splice(sourceIndex, 1);
      const adjustedTargetIndex = sourceIndex < targetIndex ? targetIndex - 1 : targetIndex;
      const insertIndex = placeAfter ? adjustedTargetIndex + 1 : adjustedTargetIndex;
      joined.splice(insertIndex, 0, moved);
      GROUP_DIRECTORY.splice(0, GROUP_DIRECTORY.length, ...joined, ...unjoined);
    }

    function exitGroupSortMode() {
      endGroupSortDrag();
      isGroupSortMode = false;
      activeGroupMenuId = '';
      renderGroupsView();
      renderComposerTargetOptions();
      rerenderTimeline();
    }

    groupsView.addEventListener('pointerdown', (event) => {
      if (!isGroupSortMode) return;
      const item = event.target.closest('.group-item.sortable');
      if (!item) return;
      const sourceId = item.dataset.groupId || '';
      groupSortPressTimer = setTimeout(() => {
        groupSortDragState = {
          sourceId,
          pointerId: event.pointerId,
          lastSignature: '',
        };
        item.classList.add('dragging');
      }, 350);
    });

    groupsView.addEventListener('pointermove', (event) => {
      if (!groupSortDragState) return;
      event.preventDefault();
      const targetEl = document.elementFromPoint(event.clientX, event.clientY);
      const targetItem = targetEl ? targetEl.closest('.group-item.sortable') : null;
      if (!targetItem) return;
      const targetId = targetItem.dataset.groupId || '';
      if (!targetId || targetId === groupSortDragState.sourceId) return;
      const rect = targetItem.getBoundingClientRect();
      const placeAfter = event.clientY > rect.top + rect.height / 2;
      const signature = `${targetId}:${placeAfter ? 'after' : 'before'}`;
      if (groupSortDragState.lastSignature === signature) return;
      groupSortDragState.lastSignature = signature;
      moveJoinedGroup(groupSortDragState.sourceId, targetId, placeAfter);
      renderGroupsView();
      renderComposerTargetOptions();
      rerenderTimeline();
      const activeItem = Array.from(joinedGroups.querySelectorAll('.group-item.sortable'))
        .find((item) => item.dataset.groupId === groupSortDragState.sourceId);
      if (activeItem) activeItem.classList.add('dragging');
    });

    function endGroupSortDrag() {
      if (groupSortPressTimer) {
        clearTimeout(groupSortPressTimer);
        groupSortPressTimer = null;
      }
      if (!groupSortDragState) return;
      groupSortDragState = null;
      const draggingItem = joinedGroups.querySelector('.group-item.sortable.dragging');
      if (draggingItem) draggingItem.classList.remove('dragging');
    }

    groupsView.addEventListener('pointerup', endGroupSortDrag);
    groupsView.addEventListener('pointercancel', endGroupSortDrag);
    document.addEventListener('pointerup', endGroupSortDrag);
    document.addEventListener('pointercancel', endGroupSortDrag);


    function handleFeedTabSwitch(event) {
      const tab = event.target.closest('[data-feed-id]');
      if (!tab) return;
      const nextFeedId = tab.dataset.feedId;
      if (!nextFeedId || currentFeedId === nextFeedId) return;
      currentFeedId = nextFeedId;
      rerenderTimeline();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    feedTabs.addEventListener('click', handleFeedTabSwitch);
    feedTabs.addEventListener('pointerup', handleFeedTabSwitch);

    composerAttachBtn.addEventListener('click', () => composerFileInput.click());
    composerCameraBtn.addEventListener('click', () => composerCameraInput.click());

    composerFileInput.addEventListener('change', async () => {
      await addComposerFiles(composerFileInput.files);
      composerFileInput.value = '';
    });
    composerCameraInput.addEventListener('change', async () => {
      await addComposerFiles(composerCameraInput.files);
      composerCameraInput.value = '';
    });

    composerAttachPreview.addEventListener('click', (event) => {
      const removeBtn = event.target.closest('[data-attach-id]');
      if (!removeBtn) return;
      const target = composerAttachments.find((item) => item.id === removeBtn.dataset.attachId);
      if (target) URL.revokeObjectURL(target.url);
      composerAttachments = composerAttachments.filter((item) => item.id !== removeBtn.dataset.attachId);
      renderComposerAttachments();
    });

    composerPostBtn.addEventListener('click', async () => {
      const text = composerInput.value.trim();
      if (!text && composerAttachments.length === 0) {
        await showAlert('投稿内容または添付ファイルを入力してください');
        return;
      }
      const targets = shareableFeeds();
      const implicitFeedId = targets.length === 1 ? targets[0].id : '';
      const targetFeedId = composerTarget.value || implicitFeedId;
      if (!targetFeedId) {
        await showAlert('投稿先のグループを選択してください');
        return;
      }
      const selectedFeed = feedMetaById(targetFeedId);
      const newId = posts.length ? Math.max(...posts.map((post) => post.id)) + 1 : 1;
      const author = authors.find((item) => item.user === CURRENT_USER) || authors[0];
      const attachmentPayload = composerAttachments.map((item) => normalizeAttachmentForPost(item));
      posts.unshift({
        id: newId,
        author,
        feedId: selectedFeed.id,
        hoursAgo: 0,
        content: text || '（添付のみの投稿）',
        media: '',
        attachments: attachmentPayload,
        readers: [],
        commentCount: 0,
        shareCount: 0,
        comments: [],
      });
      composerInput.value = '';
      composerAttachments = [];
      renderComposerAttachments();
      renderComposerTargetOptions();
      currentFeedId = selectedFeed.id;
      rerenderTimeline();
      scrollToPost(newId);
    });

    commentBack.addEventListener('click', closeCommentView);
    commentInput.addEventListener('input', () => {
      const hasText = commentInput.value.trim().length > 0;
      commentSend.classList.toggle('show', hasText);
    });
    commentSend.addEventListener('click', () => {
      const nextText = commentInput.value.trim();
      if (!nextText) return;
      const post = findCurrentPost();
      if (!post) return;
      ensureCommentIds(post);
      const nextCommentId = post.comments.reduce((maxId, c) => (Number.isFinite(c.commentId) && c.commentId > maxId ? c.commentId : maxId), 0) + 1;
      post.comments.push({ commentId: nextCommentId, user: CURRENT_USER, text: nextText, createdAt: Date.now(), edited: false });
      post.commentCount = post.comments.length;
      commentInput.value = '';
      commentSend.classList.remove('show');
      commentHeaderPopup.classList.remove('open');
      selectedOwnCommentIndex = null;
      selectedCommentIndex = null;
      selectedCommentId = null;
      editingCommentIndex = null;
      commentActionSheet.classList.remove('open');
      commentActionBackdrop.classList.remove('open');
      rerenderTimeline();
      renderCommentView(post);
      scrollCommentBodyToBottom(true);
    });
    commentHeaderMenu.addEventListener('click', (event) => {
      event.stopPropagation();
      commentHeaderPopup.classList.toggle('open');
    });
    commentHeaderPopup.addEventListener('click', async (event) => {
      const post = findCurrentPost();
      if (!post) return;

      if (event.target.closest('.comment-header-report-post')) {
        await showAlert(`投稿 #${post.id} をグループ管理者に報告しました`);
        commentHeaderPopup.classList.remove('open');
        selectedOwnCommentIndex = null;
        selectedCommentIndex = null;
        selectedCommentId = null;
        editingCommentIndex = null;
        commentActionSheet.classList.remove('open');
        commentActionBackdrop.classList.remove('open');
        return;
      }

      if (event.target.closest('.comment-header-edit-post')) {
        if (!post.author || post.author.user !== CURRENT_USER) return;
        const next = await showEditDialogForPost(post);
        if (next !== null) {
          const nextText = typeof next === 'string' ? next : (next.text || '');
          const newAttachments = (next && typeof next === 'object' && Array.isArray(next.attachments)) ? next.attachments : [];
          const trimmed = nextText.trim();
          if (trimmed || newAttachments.length > 0 || post.sharedFrom) {
            post.content = trimmed;
            post.attachments = newAttachments.map((item) => normalizeAttachmentForPost(item));
            post.edited = true;
            rerenderTimeline();
            renderCommentView(post);
          }
        }
        commentHeaderPopup.classList.remove('open');
        return;
      }

      if (event.target.closest('.comment-header-delete-post')) {
        if (!post.author || (post.author.user !== CURRENT_USER && !isCurrentUserPostAdmin(post))) return;
        if (!await showConfirm('この投稿を削除しますか？', '投稿を削除', { okText: '削除', okClass: 'danger' })) return;
        const index = posts.findIndex((p) => p.id === post.id);
        if (index >= 0) posts.splice(index, 1);
        commentHeaderPopup.classList.remove('open');
        closeCommentView();
        rerenderTimeline();
      }
    });

    document.addEventListener('click', (event) => {
      if (!event.target.closest('.menu-wrap')) {
        document.querySelectorAll('.post-menu').forEach((el) => el.classList.remove('open'));
        commentHeaderPopup.classList.remove('open');
      }
      if (!event.target.closest('.group-actions.menu') && activeGroupMenuId) {
        activeGroupMenuId = '';
        renderGroupsView();
      }
    });
    window.addEventListener('scroll', maybeLoadOlderPosts, { passive: true });
  </script>
</body>
</html>
