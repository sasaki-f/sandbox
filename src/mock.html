<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>カカリンク</title>
  <style>
    :root {
      --page-bg: #d9d4dc;
      --device-bg: #f3eef4;
      --border: #d6d0d8;
      --shadow: 0 24px 60px rgba(39, 24, 44, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100dvh;
      background:
        radial-gradient(circle at top, rgba(22, 180, 181, 0.18), transparent 28%),
        linear-gradient(180deg, #f6f1f7 0%, #ddd7df 100%);
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      color: #241f28;
    }

    .device {
      width: 100%;
      min-height: 100dvh;
      height: 100dvh;
      background: var(--device-bg);
      position: relative;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      border: 0;
      display: block;
      background: transparent;
    }

    .mock-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 68px;
      z-index: 1;
    }

    .mock-content {
      height: calc(100dvh - 142px);
      margin-top: 68px;
      background: var(--page-bg);
      border-top: 1px solid rgba(255, 255, 255, 0.28);
      border-bottom: 1px solid var(--border);
    }

    .mock-footer {
      height: 74px;
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2;
      vertical-align: top;
    }

    .guide {
      position: fixed;
      left: 16px;
      bottom: 16px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(32, 27, 35, 0.78);
      color: #fff;
      font-size: 12px;
      line-height: 1.5;
      backdrop-filter: blur(8px);
    }

    .guide code {
      font-family: Consolas, monospace;
    }

    @media (min-width: 768px) {
      body {
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      .device {
        width: min(100%, 520px);
        box-shadow: var(--shadow);
        border: 1px solid rgba(44, 30, 50, 0.08);
        border-radius: 0;
      }
    }

    @media (max-width: 767px) {
      .guide {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="device" aria-label="モックアプリ">
    <iframe
      class="mock-header"
      src="./partials/mock-header.html"
      title="ヘッダー"
      loading="eager">
    </iframe>
    <iframe
      class="mock-content"
      src="./moock-timeline.html"
      title="コンテンツ"
      loading="eager">
    </iframe>
    <iframe
      class="mock-footer"
      src="./partials/mock-footer.html"
      title="フッター"
      loading="eager">
    </iframe>
  </main>
  <aside class="guide">
    コンテンツ差し替え先: <code>src="./moock-timeline.html"</code>
  </aside>
</body>
</html>
