<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>カカリンク v1.0.0</title>
  <style>
    :root {
      --page-bg: #d9d4dc;
      --device-bg: #f3eef4;
      --border: #d6d0d8;
      --shadow: 0 24px 60px rgba(39, 24, 44, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      overscroll-behavior-x: none;
    }

    body {
      min-height: 100dvh;
      background:
        radial-gradient(circle at top, rgba(22, 180, 181, 0.18), transparent 28%),
        linear-gradient(180deg, #f6f1f7 0%, #ddd7df 100%);
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      color: #241f28;
    }

    .device {
      width: 100%;
      min-height: 100dvh;
      height: 100dvh;
      background: var(--device-bg);
      position: relative;
      overflow: hidden;
      overscroll-behavior-x: none;
    }

    iframe {
      width: 100%;
      border: 0;
      display: block;
      background: transparent;
    }

    .mock-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 68px;
      z-index: 1;
    }

    .mock-content {
      height: calc(100dvh - 142px);
      margin-top: 68px;
      background: var(--page-bg);
      border-top: 1px solid rgba(255, 255, 255, 0.28);
      border-bottom: 1px solid var(--border);
    }

    .mock-footer {
      height: 74px;
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2;
      vertical-align: top;
    }

    @media (min-width: 768px) {
      body {
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      .device {
        width: min(100%, 520px);
        box-shadow: var(--shadow);
        border: 1px solid rgba(44, 30, 50, 0.08);
        border-radius: 0;
      }
    }
  </style>
</head>
<body data-mock-version="1.0.0">
  <main class="device" aria-label="モックアプリ">
    <iframe
      class="mock-header"
      data-src="./partials/mock-header.html"
      title="ヘッダー"
      loading="eager">
    </iframe>
    <iframe
      id="mock-content-frame"
      class="mock-content"
      data-src="./moock-timeline.html"
      title="コンテンツ"
      loading="eager">
    </iframe>
    <iframe
      class="mock-footer"
      data-src="./partials/mock-footer.html"
      title="フッター"
      loading="eager">
    </iframe>
  </main>
  <script>
    const APP_HISTORY_ROOT = '__mock_root__';
    const APP_HISTORY_COMMENT = '__mock_comment__';
    let mockCommentOpen = false;

    function refreshMockFrames() {
      const stamp = Date.now();
      const version = document.body.dataset.mockVersion || '';
      document.querySelectorAll('iframe[data-src]').forEach((frame) => {
        const baseSrc = frame.dataset.src || '';
        if (!baseSrc) return;
        const url = new URL(baseSrc, window.location.href);
        if (version) url.searchParams.set('v', version);
        url.searchParams.set('_ts', String(stamp));
        frame.src = url.toString();
      });
    }

    function ensureMockHistoryState(stateName) {
      const currentState = window.history.state && window.history.state.mockState;
      if (currentState === stateName) return;
      window.history.pushState({ mockState: stateName }, '', window.location.href);
    }

    function syncMockHistoryState() {
      ensureMockHistoryState(APP_HISTORY_ROOT);
      if (mockCommentOpen) ensureMockHistoryState(APP_HISTORY_COMMENT);
    }

    window.addEventListener('message', (event) => {
      if (event.origin !== window.location.origin) return;
      const data = event.data || {};
      if (data.type === 'mock-comment-view-change') {
        mockCommentOpen = !!data.open;
        syncMockHistoryState();
      }
    });

    window.addEventListener('popstate', () => {
      const contentFrame = document.getElementById('mock-content-frame');
      if (mockCommentOpen && contentFrame && contentFrame.contentWindow) {
        contentFrame.contentWindow.postMessage({ type: 'mock-close-comment-view' }, window.location.origin);
        mockCommentOpen = false;
        ensureMockHistoryState(APP_HISTORY_ROOT);
        return;
      }
      ensureMockHistoryState(APP_HISTORY_ROOT);
    });

    refreshMockFrames();
    syncMockHistoryState();
    window.addEventListener('pageshow', refreshMockFrames);
  </script>
</body>
</html>
