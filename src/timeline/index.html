      return Number.isFinite(time) ? time : 0;
    }

    function formatMockVersion(timestamp) {
      if (!timestamp) return 'unknown';
      const date = new Date(timestamp);
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      const hh = String(date.getHours()).padStart(2, '0');
      const mm = String(date.getMinutes()).padStart(2, '0');
      const ss = String(date.getSeconds()).padStart(2, '0');
      return `${y}.${m}.${d}-${hh}${mm}${ss}`;
    }

    function applyMockVersion(version) {
      document.body.dataset.mockVersion = version;
      document.title = `${MOCK_APP_NAME} v${version}`;
      const headerFrame = document.querySelector('.mock-header');
      if (headerFrame && headerFrame.contentWindow) {
        headerFrame.contentWindow.postMessage({ type: 'mock-version-update', version }, window.location.origin);
      }
    }

    function refreshMockVersionFromDocuments() {
      const timestamps = [parseLastModified(document.lastModified)];
      document.querySelectorAll('iframe[data-src]').forEach((frame) => {
        try {
          const frameDoc = frame.contentDocument;
          if (frameDoc) timestamps.push(parseLastModified(frameDoc.lastModified));
        } catch (error) {
          // same-origin iframe only; ignore transient access errors during load
        }
      });
      applyMockVersion(formatMockVersion(Math.max(...timestamps, 0)));
    }

    function refreshMockFrames() {
      const stamp = Date.now();
      const version = document.body.dataset.mockVersion || '';
      document.querySelectorAll('iframe[data-src]').forEach((frame) => {
        const baseSrc = frame.dataset.src || '';
        if (!baseSrc) return;
        const url = new URL(baseSrc, window.location.href);
        if (version) url.searchParams.set('v', version);
        url.searchParams.set('_ts', String(stamp));
        frame.src = url.toString();
      });
    }

    function ensureMockHistoryState(stateName) {
      const currentState = window.history.state && window.history.state.mockState;
      if (currentState === stateName) return;
      window.history.pushState({ mockState: stateName }, '', window.location.href);
    }

    function syncMockHistoryState() {
      ensureMockHistoryState(APP_HISTORY_ROOT);
      if (mockCommentOpen) ensureMockHistoryState(APP_HISTORY_COMMENT);
    }

    window.addEventListener('message', (event) => {
      if (event.origin !== window.location.origin) return;
      const data = event.data || {};
      if (data.type === 'mock-comment-view-change') {
        mockCommentOpen = !!data.open;
        syncMockHistoryState();
      }
    });

    document.querySelectorAll('iframe[data-src]').forEach((frame) => {
      frame.addEventListener('load', refreshMockVersionFromDocuments);
    });

    window.addEventListener('popstate', () => {
      const contentFrame = document.getElementById('mock-content-frame');
      if (mockCommentOpen && contentFrame && contentFrame.contentWindow) {
        contentFrame.contentWindow.postMessage({ type: 'mock-close-comment-view' }, window.location.origin);
        mockCommentOpen = false;
        ensureMockHistoryState(APP_HISTORY_ROOT);
        return;
      }
      ensureMockHistoryState(APP_HISTORY_ROOT);
    });

    applyMockVersion(formatMockVersion(parseLastModified(document.lastModified)));
    refreshMockFrames();
    syncMockHistoryState();
    window.addEventListener('pageshow', refreshMockFrames);
  </script>
</body>
</html>
